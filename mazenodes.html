<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MazeNodes | Maze_Development</title>
    <link rel="icon" href="img/logo.svg" type="image/svg"/>
    <link rel="icon" href="img/logo_black.svg" type="image/svg" media="(prefers-color-scheme: light)"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==================== RESET & ROOT ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark:          #0a0a0a;
            --bg-secondary:     #151515;
            --bg-card:          #1a1a1a;
            --bg-card-hover:    #202020;
            --text-primary:     #ffffff;
            --text-secondary:   #a0a0a0;
            --accent-purple:    #c772fe;
            --accent-dim:       rgba(199,114,254,0.12);
            --border-color:     #2a2a2a;
            --border-hover:     #3a3a3a;
            --danger:           #ff5555;
            --success:          #55cc88;
            --node-start:       #1a2e1a;
            --node-start-b:     #2a5c2a;
            --node-process:     #1a1a2e;
            --node-process-b:   #2a2a5c;
            --node-decision:    #2e2a1a;
            --node-decision-b:  #5c4a1a;
            --node-end:         #2e1a1a;
            --node-end-b:       #5c2a2a;
            --node-note:        #1e1e1e;
            --node-note-b:      #333;
        }

        html, body { height: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: var(--text-primary); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-purple); }

        /* ==================== AUTH GATE ==================== */
        #auth-gate {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-dark); z-index: 9999;
        }
        #auth-gate.hidden { display: none; }
        .gate-box { text-align: center; padding: 3rem 2rem; }
        .gate-logo { font-size: 1.6rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 1rem; }
        .gate-logo span { color: var(--accent-purple); }
        .gate-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .gate-btn { display: inline-block; padding: 0.65rem 1.8rem; border: 1px solid var(--accent-purple); color: var(--accent-purple); text-decoration: none; font-family: 'Poppins', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; background: transparent; transition: background 0.2s, color 0.2s; }
        .gate-btn:hover { background: var(--accent-purple); color: #fff; }

        /* ==================== SIDEBAR ==================== */
        #sb-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1998; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(3px); }
        #sb-backdrop.open { opacity: 1; pointer-events: auto; }
        #notion-sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 260px; background: #0e0e0e; border-right: 1px solid #222; z-index: 1999; display: flex; flex-direction: column; transform: translateX(-100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); overflow: hidden; }
        #notion-sidebar.open { transform: translateX(0); box-shadow: 12px 0 40px rgba(0,0,0,0.8); }
        .sb-header { display: flex; align-items: center; gap: 0.5rem; padding: 14px 14px 12px; border-bottom: 1px solid #1c1c1c; flex-shrink: 0; }
        .sb-logo-text { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.5px; flex: 1; }
        .sb-logo-text span { color: var(--accent-purple); }
        .sb-close-btn { background: none; border: none; color: #444; font-size: 0.85rem; cursor: pointer; padding: 4px 7px; border-radius: 4px; transition: background 0.15s, color 0.15s; flex-shrink: 0; }
        .sb-close-btn:hover { background: #1e1e1e; color: #ccc; }
        .sb-user-row { display: flex; align-items: center; gap: 0.6rem; padding: 10px 14px; border-bottom: 1px solid #1c1c1c; flex-shrink: 0; }
        .sb-user-avatar { width: 26px; height: 26px; border-radius: 6px; background: var(--accent-dim); border: 1px solid rgba(199,114,254,0.35); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: var(--accent-purple); overflow: hidden; flex-shrink: 0; }
        .sb-user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; }
        .sb-username { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; color: #ddd; }
        .sb-body { flex: 1; overflow-y: auto; padding: 6px 0; }
        .sb-body::-webkit-scrollbar { width: 3px; }
        .sb-section-label { font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #333; padding: 12px 14px 3px; }
        .sb-item { display: flex; align-items: center; gap: 8px; padding: 6px 14px 6px 12px; font-size: 0.82rem; color: #626262; text-decoration: none; background: none; border: none; border-left: 2px solid transparent; font-family: 'Poppins', sans-serif; cursor: pointer; width: 100%; text-align: left; transition: background 0.12s, color 0.12s, border-color 0.12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sb-item:hover { background: rgba(255,255,255,0.04); color: #ddd; }
        .sb-item.active { color: var(--accent-purple); background: rgba(199,114,254,0.07); border-left-color: var(--accent-purple); }
        .sb-item .sb-icon { flex-shrink: 0; width: 20px; display: inline-flex; align-items: center; justify-content: center; opacity: 0.8; }
        .sb-item.active .sb-icon { opacity: 1; }
        .sb-item.muted { color: #2b2b2b; }
        .sb-item.muted:hover { color: #4d4d4d; background: rgba(255,255,255,0.02); }
        .sb-divider { height: 1px; background: #161616; margin: 4px 0; }
        .sb-footer { border-top: 1px solid #1c1c1c; padding: 6px 0; flex-shrink: 0; }
        .sb-open-btn { background: none; border: none; color: var(--text-secondary); padding: 0 8px; display: flex; align-items: center; justify-content: center; transition: color 0.15s; flex-shrink: 0; height: 48px; cursor: pointer; border-radius: 4px; }
        .sb-open-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
        @media (max-width: 768px) { #notion-sidebar { width: min(280px, 82vw); } }

        /* ==================== TOP BAR ==================== */
        #topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 48px;
            background: rgba(10,10,10,0.97);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0 1rem;
            z-index: 1000;
            user-select: none;
        }

        .topbar-logo { font-size: 1rem; font-weight: 700; letter-spacing: 0.5px; text-decoration: none; color: var(--text-primary); white-space: nowrap; }
        .topbar-logo span { color: var(--accent-purple); }
        .topbar-sep { width: 1px; height: 20px; background: var(--border-color); margin: 0 4px; flex-shrink: 0; }
        .topbar-spacer { flex: 1; }

        .topbar-icon-btn {
            width: 30px; height: 30px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 3px;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
            font-size: 0.8rem;
            font-family: 'Poppins', sans-serif;
        }
        .topbar-icon-btn:hover { border-color: var(--border-color); color: var(--text-primary); }
        .topbar-icon-btn.active { border-color: var(--accent-purple); color: var(--accent-purple); background: var(--accent-dim); }

        #flow-name-display {
            font-size: 0.85rem; font-weight: 600;
            color: var(--text-secondary);
            padding: 0.2rem 0.5rem;
            border: 1px solid transparent;
            cursor: pointer;
            max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            transition: border-color 0.15s;
            border-radius: 3px;
        }
        #flow-name-display:hover { border-color: var(--border-color); color: var(--text-primary); }

        #zoom-display { font-size: 0.72rem; color: var(--text-secondary); cursor: pointer; padding: 0 4px; min-width: 38px; text-align: center; }
        #zoom-display:hover { color: var(--text-primary); }

        .topbar-nav-link {
            display: inline-flex; align-items: center; gap: 5px;
            background: none; border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-family: 'Poppins', sans-serif; font-size: 0.78rem;
            padding: 0.3rem 0.75rem; text-decoration: none;
            transition: border-color 0.2s, color 0.2s; white-space: nowrap; cursor: pointer;
        }
        .topbar-nav-link:hover { border-color: var(--accent-purple); color: var(--accent-purple); }

        .user-chip { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--text-secondary); }
        .user-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-dim); border: 1px solid var(--accent-purple); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 600; color: var(--accent-purple); overflow: hidden; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .btn-signout { background: none; border: 1px solid var(--border-color); color: var(--text-secondary); font-family: 'Poppins', sans-serif; font-size: 0.78rem; padding: 0.3rem 0.75rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
        .btn-signout:hover { border-color: var(--danger); color: var(--danger); }

        /* ==================== NODE PALETTE ==================== */
        #node-palette {
            position: fixed;
            top: 57px; left: 12px;
            display: flex; flex-direction: column;
            gap: 4px;
            z-index: 900;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 8px 6px;
        }

        .pal-section-label { font-size: 0.52rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #444; padding: 4px 6px 2px; }

        .pal-node-btn {
            display: flex; align-items: center; gap: 7px;
            padding: 6px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.72rem;
            cursor: grab;
            transition: border-color 0.15s, color 0.15s;
            white-space: nowrap;
            user-select: none;
        }
        .pal-node-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
        .pal-node-btn:active { cursor: grabbing; }
        .pal-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .pal-divider { height: 1px; background: var(--border-color); margin: 2px 0; }

        /* ==================== FLOWS SIDEBAR ==================== */
        #flows-sidebar {
            position: fixed; top: 48px; left: 0; bottom: 0;
            width: 220px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 950;
        }
        #flows-sidebar.open { transform: translateX(0); }
        .flows-sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .flows-sidebar-title { font-size: 0.8rem; font-weight: 700; }
        .flows-sidebar-close { background: none; border: none; color: #555; cursor: pointer; font-size: 0.8rem; }
        .flows-sidebar-close:hover { color: #ccc; }
        .flows-list { flex: 1; overflow-y: auto; padding: 6px 0; }
        .flow-item { display: flex; align-items: center; gap: 6px; padding: 7px 14px; font-size: 0.8rem; color: #777; cursor: pointer; border-left: 2px solid transparent; transition: background 0.1s, color 0.1s; }
        .flow-item:hover { background: rgba(255,255,255,0.04); color: #ccc; }
        .flow-item.active { color: var(--accent-purple); border-left-color: var(--accent-purple); background: var(--accent-dim); }
        .flow-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .flow-item-del { background: none; border: none; color: #333; font-size: 0.7rem; cursor: pointer; padding: 0 4px; opacity: 0; transition: color 0.1s, opacity 0.1s; }
        .flow-item:hover .flow-item-del { opacity: 1; }
        .flow-item-del:hover { color: var(--danger); }
        .flows-sidebar-footer { padding: 8px 10px; border-top: 1px solid var(--border-color); }
        .btn-new-flow { width: 100%; background: transparent; border: 1px dashed var(--border-color); color: var(--text-secondary); font-family: 'Poppins', sans-serif; font-size: 0.78rem; padding: 0.5rem; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
        .btn-new-flow:hover { border-color: var(--accent-purple); color: var(--accent-purple); }

        /* ==================== CANVAS ==================== */
        #canvas-bg {
            position: fixed; inset: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #1e1e1e 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 0;
        }

        #canvas-wrap {
            position: fixed;
            inset: 48px 0 0 0;
            overflow: hidden;
            cursor: default;
            z-index: 1;
        }
        #canvas-wrap.panning { cursor: grabbing; }
        #canvas-wrap.tool-pan { cursor: grab; }

        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            transform-origin: 0 0;
        }

        /* ==================== NODES ==================== */
        .flow-node {
            position: absolute;
            min-width: 160px;
            max-width: 260px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            cursor: default;
            user-select: none;
            transition: box-shadow 0.15s;
        }
        .flow-node:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.7); }
        .flow-node.selected { border-color: var(--accent-purple); box-shadow: 0 0 0 2px rgba(199,114,254,0.3), 0 6px 24px rgba(0,0,0,0.7); }
        .flow-node.dragging { opacity: 0.85; box-shadow: 0 12px 40px rgba(0,0,0,0.8); z-index: 100; }

        /* node type colours */
        .flow-node[data-type="start"]    { background: var(--node-start);    border-color: var(--node-start-b); }
        .flow-node[data-type="end"]      { background: var(--node-end);      border-color: var(--node-end-b); }
        .flow-node[data-type="decision"] { background: var(--node-decision); border-color: var(--node-decision-b); }
        .flow-node[data-type="process"]  { background: var(--node-process);  border-color: var(--node-process-b); }
        .flow-node[data-type="note"]     { background: var(--node-note);     border-color: var(--node-note-b); }

        .node-header {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 10px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            cursor: grab;
        }
        .node-header:active { cursor: grabbing; }
        .node-type-badge {
            font-size: 0.55rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            padding: 2px 5px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .flow-node[data-type="start"]    .node-type-badge { background: rgba(85,204,136,0.2); color: #55cc88; }
        .flow-node[data-type="end"]      .node-type-badge { background: rgba(255,85,85,0.2);   color: #ff5555; }
        .flow-node[data-type="decision"] .node-type-badge { background: rgba(255,200,50,0.2);  color: #ffc832; }
        .flow-node[data-type="process"]  .node-type-badge { background: rgba(100,130,255,0.2); color: #8899ff; }
        .flow-node[data-type="note"]     .node-type-badge { background: rgba(160,160,160,0.12); color: #888; }

        .node-title-input {
            flex: 1;
            background: transparent; border: none;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.82rem; font-weight: 600;
            outline: none;
            cursor: text;
            min-width: 0;
        }
        .node-title-input::placeholder { color: #555; }

        .node-del-btn {
            background: none; border: none;
            color: #333; cursor: pointer;
            display: flex; align-items: center;
            padding: 2px 3px;
            border-radius: 3px;
            transition: color 0.15s;
            opacity: 0;
            flex-shrink: 0;
        }
        .flow-node:hover .node-del-btn { opacity: 1; }
        .node-del-btn:hover { color: var(--danger); }

        .node-body {
            padding: 8px 10px 10px;
        }
        .node-body-textarea {
            width: 100%;
            background: transparent; border: none;
            color: var(--text-secondary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.78rem; line-height: 1.5;
            outline: none; resize: none;
            min-height: 40px;
        }
        .node-body-textarea::placeholder { color: #444; }

        /* ── Connection ports ── */
        .conn-port {
            position: absolute;
            width: 10px; height: 10px;
            background: var(--border-color);
            border: 2px solid #0a0a0a;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s, transform 0.15s, background 0.15s;
            z-index: 10;
        }
        .conn-port[data-port="top"]    { top: -6px;    left: 50%; transform: translateX(-50%) scale(0.7); }
        .conn-port[data-port="bottom"] { bottom: -6px; left: 50%; transform: translateX(-50%) scale(0.7); }
        .conn-port[data-port="left"]   { left: -6px;   top: 50%;  transform: translateY(-50%) scale(0.7); }
        .conn-port[data-port="right"]  { right: -6px;  top: 50%;  transform: translateY(-50%) scale(0.7); }

        #canvas-wrap.tool-connect .flow-node { overflow: visible; }
        #canvas-wrap.tool-connect .conn-port { pointer-events: auto; }
        #canvas-wrap.tool-connect .flow-node:hover .conn-port { opacity: 1; }
        #canvas-wrap.tool-connect .flow-node:hover .conn-port[data-port="top"]    { transform: translateX(-50%) scale(1); }
        #canvas-wrap.tool-connect .flow-node:hover .conn-port[data-port="bottom"] { transform: translateX(-50%) scale(1); }
        #canvas-wrap.tool-connect .flow-node:hover .conn-port[data-port="left"]   { transform: translateY(-50%) scale(1); }
        #canvas-wrap.tool-connect .flow-node:hover .conn-port[data-port="right"]  { transform: translateY(-50%) scale(1); }
        .conn-port.snap { background: #fff !important; opacity: 1 !important; transform: translateX(-50%) scale(1.3) !important; }
        .conn-port.snap[data-port="left"],
        .conn-port.snap[data-port="right"] { transform: translateY(-50%) scale(1.3) !important; }

        /* ── SVG connector overlay ── */
        #connector-svg {
            position: fixed;
            inset: 48px 0 0 0;
            pointer-events: none;
            z-index: 2;
            overflow: visible;
        }
        .edge-path { fill: none; stroke: #3a3a3a; stroke-width: 2; pointer-events: none; }
        .edge-path.selected { stroke: var(--accent-purple) !important; }
        .edge-hitbox { fill: none; stroke: transparent; stroke-width: 16; pointer-events: stroke; cursor: pointer; }
        .edge-arrow { fill: #3a3a3a; }

        /* Temp edge while drawing */
        #temp-edge { fill: none; stroke: var(--accent-purple); stroke-width: 2; stroke-dasharray: 6 4; pointer-events: none; }

        /* ==================== RENAME MODAL ==================== */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border-color); padding: 1.8rem; min-width: 320px; max-width: 480px; width: 90%; }
        .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1.2rem; }
        .modal-input { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-primary); font-family: 'Poppins', sans-serif; font-size: 0.88rem; padding: 0.6rem 0.85rem; outline: none; margin-bottom: 1.2rem; transition: border-color 0.2s; }
        .modal-input:focus { border-color: var(--accent-purple); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; }
        .btn-cancel { background: none; border: 1px solid var(--border-color); color: var(--text-secondary); font-family: 'Poppins', sans-serif; font-size: 0.82rem; padding: 0.45rem 1rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
        .btn-cancel:hover { border-color: var(--text-secondary); color: var(--text-primary); }
        .btn-primary { background: none; border: 1px solid var(--accent-purple); color: var(--accent-purple); font-family: 'Poppins', sans-serif; font-size: 0.82rem; padding: 0.45rem 1rem; cursor: pointer; transition: background 0.2s, color 0.2s; }
        .btn-primary:hover { background: var(--accent-purple); color: #fff; }

        /* ==================== SAVE INDICATOR ==================== */
        #save-indicator { position: fixed; bottom: 18px; right: 18px; font-size: 0.72rem; color: #555; opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 800; }
        #save-indicator.visible { opacity: 1; }

        /* ==================== TOAST ==================== */
        #toast-container { position: fixed; bottom: 50px; right: 18px; display: flex; flex-direction: column-reverse; gap: 8px; z-index: 5000; }
        .toast { background: var(--bg-card); border: 1px solid var(--border-color); padding: 0.6rem 1rem; font-size: 0.8rem; opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--danger); color: var(--danger); }
    </style>
</head>
<body>

<!-- Auth gate -->
<div id="auth-gate">
    <div class="gate-box">
        <div class="gate-logo">MAZE<span>_</span>NODES</div>
        <p class="gate-subtitle">Sign in to access your workflows.</p>
        <a href="login.html?redirect=mazenodes.html" class="gate-btn">Sign In</a>
    </div>

<!-- ==================== SCRIPT ==================== -->
<script type="module">
    import { initializeApp }            from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
                                        from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";
    import {
        getFirestore, collection, doc, addDoc, setDoc, deleteDoc,
        onSnapshot, query, orderBy, serverTimestamp, getDoc
    } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

    const USE_LOCAL_CONFIG = 'auto';
    let firebaseConfig;
    const isLocal = USE_LOCAL_CONFIG === true ||
        (USE_LOCAL_CONFIG === 'auto' && (location.hostname === 'localhost' || location.hostname === '127.0.0.1'));
    if (isLocal) {
        try { ({ firebaseConfig } = await import('./firebase.local.js')); }
        catch { ({ firebaseConfig } = await import('./firebase.js')); }
    } else {
        ({ firebaseConfig } = await import('./firebase.js'));
    }

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    let currentFlowId = null;
    let unsubFlows = null;

    /* ──────────────────────────────────────────────────────────────
       STATE
    ────────────────────────────────────────────────────────────── */
    let nodes = {};   // id → { type, title, body, x, y }
    let edges = [];   // { id, from, fromPort, to, toPort }
    let zoom  = 1;
    let panX  = 0, panY = 0;
    let tool  = 'select';

    let selectedNodeId  = null;
    let selectedEdgeId  = null;

    // drag state
    let draggingNodeId  = null;
    let dragStart       = null;
    let nodeStart       = null;

    // pan state
    let isPanning       = false;
    let panStart        = null;
    let panOrigin       = null;

    // connect state
    let connectFrom     = null; // { nodeId, port }

    // palette drag
    let palDragType = null;

    let saveTimer = null;

    /* ──────────────────────────────────────────────────────────────
       AUTH
    ────────────────────────────────────────────────────────────── */
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            document.getElementById('auth-gate').classList.remove('hidden');
            return;
        }
        currentUser = user;
        document.getElementById('auth-gate').classList.add('hidden');

        const displayName = user.displayName || user.email || '?';
        document.getElementById('user-name').textContent = displayName;
        const av = document.getElementById('user-avatar');
        if (user.photoURL) { av.innerHTML = `<img src="${user.photoURL}" alt="">`; }
        else { av.textContent = displayName[0].toUpperCase(); }
        sbInit(user);

        loadFlows();
    });

    window.doSignOut = async () => { await signOut(auth); window.location.href = 'login.html'; };

    /* ──────────────────────────────────────────────────────────────
       FIRESTORE HELPERS
    ────────────────────────────────────────────────────────────── */
    const flowsRef  = () => collection(db, 'users', currentUser.uid, 'flows');
    const flowDoc   = (id) => doc(db, 'users', currentUser.uid, 'flows', id);

    /* ──────────────────────────────────────────────────────────────
       FLOWS LIST
    ────────────────────────────────────────────────────────────── */
    function loadFlows() {
        if (unsubFlows) unsubFlows();
        const q = query(flowsRef(), orderBy('createdAt'));
        unsubFlows = onSnapshot(q, snap => {
            const list = document.getElementById('flows-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const item = document.createElement('div');
                item.className = 'flow-item' + (d.id === currentFlowId ? ' active' : '');
                item.dataset.id = d.id;
                item.innerHTML = `
                    <span class="flow-item-name">${escHtml(d.data().name || 'Untitled')}</span>
                    <button class="flow-item-del" title="Delete flow" onclick="event.stopPropagation();deleteFlow('${d.id}')">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>`;
                item.addEventListener('click', () => openFlow(d.id, d.data()));
                list.appendChild(item);
            });
            // Auto-open first flow if none loaded
            if (!currentFlowId && !snap.empty) {
                const d = snap.docs[0];
                openFlow(d.id, d.data());
            }
        });
    }

    async function createNewFlow() {
        const ref = await addDoc(flowsRef(), {
            name: 'Untitled Flow',
            nodes: {},
            edges: [],
            createdAt: serverTimestamp()
        });
        openFlow(ref.id, { name: 'Untitled Flow', nodes: {}, edges: [] });
        toggleFlowsSidebar();
    }
    window.createNewFlow = createNewFlow;

    async function deleteFlow(id) {
        await deleteDoc(flowDoc(id));
        if (currentFlowId === id) {
            currentFlowId = null;
            nodes = {}; edges = [];
            renderAll();
        }
    }
    window.deleteFlow = deleteFlow;

    function openFlow(id, data) {
        currentFlowId = id;
        nodes = data.nodes || {};
        edges = data.edges || [];
        zoom = 1; panX = 0; panY = 0; applyTransform();
        renderAll();
        document.getElementById('flow-name-display').textContent = data.name || 'Untitled Flow';
        document.querySelectorAll('.flow-item').forEach(el => {
            el.classList.toggle('active', el.dataset.id === id);
        });
    }

    /* ──────────────────────────────────────────────────────────────
       SAVE (debounced)
    ────────────────────────────────────────────────────────────── */
    function schedSave() {
        if (!currentFlowId) return;
        if (saveTimer) clearTimeout(saveTimer);
        showSaveIndicator();
        saveTimer = setTimeout(async () => {
            await setDoc(flowDoc(currentFlowId), {
                nodes, edges,
                name: document.getElementById('flow-name-display').textContent,
                updatedAt: serverTimestamp()
            }, { merge: true });
            hideSaveIndicator();
        }, 800);
    }

    function showSaveIndicator() { document.getElementById('save-indicator').classList.add('visible'); }
    function hideSaveIndicator() { document.getElementById('save-indicator').classList.remove('visible'); }

    /* ──────────────────────────────────────────────────────────────
       RENDER
    ────────────────────────────────────────────────────────────── */
    function renderAll() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = '';
        Object.entries(nodes).forEach(([id, nd]) => renderNode(id, nd));
        renderEdges();
    }

    function renderNode(id, nd) {
        const el = document.createElement('div');
        el.className = 'flow-node';
        el.dataset.id  = id;
        el.dataset.type = nd.type;
        el.style.left  = nd.x + 'px';
        el.style.top   = nd.y + 'px';
        if (selectedNodeId === id) el.classList.add('selected');

        const badge = {
            start: 'Start', end: 'End', decision: 'Decision', process: 'Process', note: 'Note'
        }[nd.type] || nd.type;

        el.innerHTML = `
            <div class="conn-port" data-port="top"></div>
            <div class="conn-port" data-port="bottom"></div>
            <div class="conn-port" data-port="left"></div>
            <div class="conn-port" data-port="right"></div>
            <div class="node-header">
                <span class="node-type-badge">${badge}</span>
                <input class="node-title-input" value="${escHtml(nd.title || '')}" placeholder="Label…">
                <button class="node-del-btn" title="Delete node">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            ${nd.type !== 'start' && nd.type !== 'end' ? `
            <div class="node-body">
                <textarea class="node-body-textarea" rows="2" placeholder="Notes…">${escHtml(nd.body || '')}</textarea>
            </div>` : ''}`;

        // Title input
        el.querySelector('.node-title-input').addEventListener('input', e => {
            nodes[id].title = e.target.value;
            schedSave();
        });
        el.querySelector('.node-title-input').addEventListener('pointerdown', e => e.stopPropagation());

        // Body textarea
        const ta = el.querySelector('.node-body-textarea');
        if (ta) {
            ta.addEventListener('input', e => { nodes[id].body = e.target.value; schedSave(); });
            ta.addEventListener('pointerdown', e => e.stopPropagation());
        }

        // Delete
        el.querySelector('.node-del-btn').addEventListener('click', e => { e.stopPropagation(); deleteNode(id); });

        // Drag header
        el.querySelector('.node-header').addEventListener('pointerdown', e => {
            if (tool !== 'select') return;
            e.preventDefault();
            e.stopPropagation();
            selectNode(id);
            draggingNodeId = id;
            dragStart = screenToCanvas(e.clientX, e.clientY);
            nodeStart  = { x: nd.x, y: nd.y };
            el.classList.add('dragging');
            document.addEventListener('pointermove', onNodeDrag);
            document.addEventListener('pointerup',   onNodeDragEnd, { once: true });
        });

        // Select on click
        el.addEventListener('pointerdown', e => {
            if (tool === 'select') selectNode(id);
        });

        // Connection ports
        el.querySelectorAll('.conn-port').forEach(port => {
            port.addEventListener('pointerdown', e => {
                if (tool !== 'connect') return;
                e.preventDefault(); e.stopPropagation();
                connectFrom = { nodeId: id, port: port.dataset.port };
                document.getElementById('temp-edge').setAttribute('d', '');
            });
        });

        document.getElementById('canvas').appendChild(el);
    }

    function deleteNode(id) {
        delete nodes[id];
        edges = edges.filter(e => e.from !== id && e.to !== id);
        if (selectedNodeId === id) selectedNodeId = null;
        renderAll();
        schedSave();
    }

    function selectNode(id) {
        selectedNodeId = id;
        selectedEdgeId = null;
        document.querySelectorAll('.flow-node').forEach(el => el.classList.toggle('selected', el.dataset.id === id));
        document.querySelectorAll('.edge-path').forEach(el => el.classList.remove('selected'));
    }

    /* ──────────────────────────────────────────────────────────────
       NODE DRAGGING
    ────────────────────────────────────────────────────────────── */
    function onNodeDrag(e) {
        if (!draggingNodeId) return;
        const cur = screenToCanvas(e.clientX, e.clientY);
        nodes[draggingNodeId].x = nodeStart.x + (cur.x - dragStart.x);
        nodes[draggingNodeId].y = nodeStart.y + (cur.y - dragStart.y);
        const el = document.querySelector(`.flow-node[data-id="${draggingNodeId}"]`);
        if (el) { el.style.left = nodes[draggingNodeId].x + 'px'; el.style.top = nodes[draggingNodeId].y + 'px'; }
        renderEdges();
    }

    function onNodeDragEnd() {
        if (!draggingNodeId) return;
        document.querySelector(`.flow-node[data-id="${draggingNodeId}"]`)?.classList.remove('dragging');
        draggingNodeId = null;
        document.removeEventListener('pointermove', onNodeDrag);
        schedSave();
    }

    /* ──────────────────────────────────────────────────────────────
       PALETTE DRAG-DROP
    ────────────────────────────────────────────────────────────── */
    window.palDragStart = (e) => { palDragType = e.currentTarget.dataset.type; e.dataTransfer.effectAllowed = 'copy'; };

    window.canvasDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; };

    window.canvasDrop = (e) => {
        e.preventDefault();
        if (!palDragType || !currentFlowId) return;
        const pos = screenToCanvas(e.clientX, e.clientY);
        const id  = 'n_' + Date.now();
        nodes[id] = { type: palDragType, title: '', body: '', x: pos.x - 80, y: pos.y - 30 };
        renderNode(id, nodes[id]);
        renderEdges();
        schedSave();
        palDragType = null;
    };

    /* ──────────────────────────────────────────────────────────────
       EDGES / CONNECTIONS
    ────────────────────────────────────────────────────────────── */
    function renderEdges() {
        const g = document.getElementById('edges-group');
        g.innerHTML = '';
        edges.forEach(edge => {
            const fromEl = document.querySelector(`.flow-node[data-id="${edge.from}"]`);
            const toEl   = document.querySelector(`.flow-node[data-id="${edge.to}"]`);
            if (!fromEl || !toEl) return;
            const { x: x1, y: y1 } = portCenter(fromEl, edge.fromPort);
            const { x: x2, y: y2 } = portCenter(toEl,   edge.toPort);
            const d = cubicPath(x1, y1, x2, y2, edge.fromPort, edge.toPort);

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('class', 'edge-path' + (selectedEdgeId === edge.id ? ' selected' : ''));
            path.setAttribute('d', d);
            path.setAttribute('marker-end', selectedEdgeId === edge.id ? 'url(#arrow-sel)' : 'url(#arrow)');

            const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            hit.setAttribute('class', 'edge-hitbox');
            hit.setAttribute('d', d);
            hit.addEventListener('click', () => {
                selectedEdgeId = edge.id;
                selectedNodeId = null;
                document.querySelectorAll('.flow-node').forEach(el => el.classList.remove('selected'));
                renderEdges();
            });

            // Delete selected edge with Delete key (registered globally)
            g.appendChild(path);
            g.appendChild(hit);
        });
    }

    function portCenter(nodeEl, port) {
        const rect = nodeEl.getBoundingClientRect();
        const cw   = document.getElementById('canvas-wrap');
        const cwRect = cw.getBoundingClientRect();
        const rawX = rect.left - cwRect.left;
        const rawY = rect.top  - cwRect.top;
        // Convert screen coords back to canvas coords
        const cx = (rawX - panX) / zoom;
        const cy = (rawY - panY) / zoom;
        const w  = rect.width  / zoom;
        const h  = rect.height / zoom;
        if (port === 'top')    return { x: cx + w/2, y: cy };
        if (port === 'bottom') return { x: cx + w/2, y: cy + h };
        if (port === 'left')   return { x: cx,       y: cy + h/2 };
        if (port === 'right')  return { x: cx + w,   y: cy + h/2 };
        return { x: cx + w/2, y: cy + h/2 };
    }

    function cubicPath(x1, y1, x2, y2, fromPort, toPort) {
        const d = Math.max(40, Math.abs(x2 - x1) * 0.5, Math.abs(y2 - y1) * 0.5);
        const offset = (p) => {
            if (p === 'right')  return { dx:  d, dy: 0 };
            if (p === 'left')   return { dx: -d, dy: 0 };
            if (p === 'bottom') return { dx: 0,  dy:  d };
            if (p === 'top')    return { dx: 0,  dy: -d };
            return { dx: d, dy: 0 };
        };
        const o1 = offset(fromPort);
        const o2 = offset(toPort);
        return `M${x1},${y1} C${x1+o1.dx},${y1+o1.dy} ${x2+o2.dx},${y2+o2.dy} ${x2},${y2}`;
    }

    /* ──────────────────────────────────────────────────────────────
       CANVAS PAN + POINTER for connecting
    ────────────────────────────────────────────────────────────── */
    const canvasWrap = document.getElementById('canvas-wrap');

    canvasWrap.addEventListener('pointerdown', e => {
        // connection drag
        if (connectFrom) return;
        if (tool === 'pan' || (tool === 'select' && e.button === 1) || (e.button === 0 && tool === 'pan')) {
            isPanning = true;
            panStart  = { x: e.clientX, y: e.clientY };
            panOrigin = { x: panX, y: panY };
            canvasWrap.setPointerCapture(e.pointerId);
            canvasWrap.classList.add('panning');
        }
        if (tool === 'select') {
            selectedNodeId = null; selectedEdgeId = null;
            document.querySelectorAll('.flow-node').forEach(el => el.classList.remove('selected'));
            renderEdges();
        }
    });

    canvasWrap.addEventListener('pointermove', e => {
        if (isPanning) {
            panX = panOrigin.x + (e.clientX - panStart.x);
            panY = panOrigin.y + (e.clientY - panStart.y);
            applyTransform();
        }
        // temp edge while connecting
        if (connectFrom && canvasWrap.classList.contains('tool-connect')) {
            const fromEl = document.querySelector(`.flow-node[data-id="${connectFrom.nodeId}"]`);
            if (fromEl) {
                const { x: x1, y: y1 } = portCenter(fromEl, connectFrom.port);
                const cur = screenToCanvas(e.clientX, e.clientY);
                const d   = cubicPath(x1, y1, cur.x, cur.y, connectFrom.port, 'top');
                document.getElementById('temp-edge').setAttribute('d', d);
            }
        }
    });

    canvasWrap.addEventListener('pointerup', e => {
        if (isPanning) { isPanning = false; canvasWrap.classList.remove('panning'); }
        if (connectFrom) {
            // Did we land on a port?
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (target && target.classList.contains('conn-port')) {
                const toNode = target.closest('.flow-node');
                if (toNode && toNode.dataset.id !== connectFrom.nodeId) {
                    const edgeId = 'e_' + Date.now();
                    edges.push({ id: edgeId, from: connectFrom.nodeId, fromPort: connectFrom.port, to: toNode.dataset.id, toPort: target.dataset.port });
                    renderEdges();
                    schedSave();
                }
            }
            connectFrom = null;
            document.getElementById('temp-edge').setAttribute('d', '');
        }
    });

    canvasWrap.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        adjustZoom(delta, e.clientX, e.clientY);
    }, { passive: false });

    /* ──────────────────────────────────────────────────────────────
       ZOOM / PAN
    ────────────────────────────────────────────────────────────── */
    function applyTransform() {
        document.getElementById('canvas').style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
        document.getElementById('zoom-display').textContent = Math.round(zoom * 100) + '%';
    }

    window.adjustZoom = (delta, cx, cy) => {
        const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
        const ox = cx !== undefined ? cx - wrap.left : wrap.width  / 2;
        const oy = cy !== undefined ? cy - wrap.top  : wrap.height / 2;
        const newZoom = Math.min(3, Math.max(0.15, zoom + delta));
        panX = ox - (ox - panX) * (newZoom / zoom);
        panY = oy - (oy - panY) * (newZoom / zoom);
        zoom = newZoom;
        applyTransform();
        renderEdges(); // recompute port centers
    };

    window.resetZoom = () => { zoom = 1; panX = 0; panY = 0; applyTransform(); renderEdges(); };

    window.fitToScreen = () => {
        const nodeEls = document.querySelectorAll('.flow-node');
        if (!nodeEls.length) return;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        nodeEls.forEach(el => {
            const x = parseFloat(el.style.left), y = parseFloat(el.style.top);
            minX = Math.min(minX, x); minY = Math.min(minY, y);
            maxX = Math.max(maxX, x + el.offsetWidth); maxY = Math.max(maxY, y + el.offsetHeight);
        });
        const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
        const pad  = 60;
        const scaleX = (wrap.width  - pad*2) / (maxX - minX || 1);
        const scaleY = (wrap.height - pad*2) / (maxY - minY || 1);
        zoom = Math.min(1.5, scaleX, scaleY);
        panX = pad - minX * zoom;
        panY = pad - minY * zoom;
        applyTransform();
        renderEdges();
    };

    function screenToCanvas(sx, sy) {
        const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
        return { x: (sx - wrap.left - panX) / zoom, y: (sy - wrap.top - panY) / zoom };
    }

    /* ──────────────────────────────────────────────────────────────
       TOOLS
    ────────────────────────────────────────────────────────────── */
    window.setTool = (t) => {
        tool = t;
        ['select','pan','connect'].forEach(id => {
            document.getElementById(`tool-${id}-btn`)?.classList.toggle('active', id === t);
        });
        canvasWrap.className = `tool-${t}`;
    };

    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.code === 'KeyV') setTool('select');
        if (e.code === 'KeyC') setTool('connect');
        if (e.code === 'Space') { e.preventDefault(); setTool('pan'); }
        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedEdgeId) {
            edges = edges.filter(ed => ed.id !== selectedEdgeId);
            selectedEdgeId = null;
            renderEdges();
            schedSave();
        }
        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNodeId) {
            deleteNode(selectedNodeId);
        }
    });
    document.addEventListener('keyup', e => {
        if (e.code === 'Space' && tool === 'pan') setTool('select');
    });

    /* ──────────────────────────────────────────────────────────────
       RENAME MODAL
    ────────────────────────────────────────────────────────────── */
    window.openRenameModal = () => {
        document.getElementById('rename-input').value = document.getElementById('flow-name-display').textContent;
        document.getElementById('rename-modal').classList.add('open');
        document.getElementById('rename-input').focus();
    };
    window.closeRenameModal = () => document.getElementById('rename-modal').classList.remove('open');
    window.confirmRename = () => {
        const name = document.getElementById('rename-input').value.trim() || 'Untitled Flow';
        document.getElementById('flow-name-display').textContent = name;
        schedSave();
        closeRenameModal();
    };
    document.getElementById('rename-input').addEventListener('keydown', e => { if (e.key === 'Enter') confirmRename(); });
    document.getElementById('rename-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeRenameModal(); });

    /* ──────────────────────────────────────────────────────────────
       FLOWS SIDEBAR TOGGLE
    ────────────────────────────────────────────────────────────── */
    window.toggleFlowsSidebar = () => {
        const sb = document.getElementById('flows-sidebar');
        const open = sb.classList.toggle('open');
        document.getElementById('btn-flows-toggle').classList.toggle('active', open);
    };

    /* ──────────────────────────────────────────────────────────────
       NOTION SIDEBAR
    ────────────────────────────────────────────────────────────── */
    function sbInit(user) {
        const name = user.displayName || user.email || '?';
        document.getElementById('sb-username').textContent = name;
        const av = document.getElementById('sb-avatar');
        if (user.photoURL) { av.innerHTML = `<img src="${user.photoURL}" alt="">`; }
        else { av.innerHTML = `<span>${name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}</span>`; }
    }
    window.openSidebar  = () => { document.getElementById('notion-sidebar').classList.add('open'); document.getElementById('sb-backdrop').classList.add('open'); };
    window.closeSidebar = () => { document.getElementById('notion-sidebar').classList.remove('open'); document.getElementById('sb-backdrop').classList.remove('open'); };

    /* ──────────────────────────────────────────────────────────────
       UTIL
    ────────────────────────────────────────────────────────────── */
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    /* ── Initial state ── */
    setTool('select');
    applyTransform();

</script>
</body>
</html>
