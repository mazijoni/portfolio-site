<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Video Test</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0b1016;
            --panel: rgba(20, 28, 38, 0.9);
            --panel-border: rgba(130, 155, 185, 0.18);
            --text: #eef3f8;
            --muted: #9eb0c3;
            --accent: #59d0ff;
            --danger: #ff8f8f;
        }

        .notice {
            margin-top: 22px;
            padding: 18px 20px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            line-height: 1.6;
        }

        .notice strong {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            min-height: 1.4rem;
            font-size: 0.95rem;
        }

        .status.error {
            color: var(--danger);
        }

        .card {
            margin-top: 24px;
            display: none;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(137, 163, 191, 0.14);
            background: rgba(8, 13, 20, 0.9);
        }

        .card.open {
            display: block;
        }

        .meta {
            display: flex;
            gap: 14px;
            align-items: center;
            padding: 18px;
            border-bottom: 1px solid rgba(137, 163, 191, 0.12);
        }

        .meta img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.08);
        }

        .meta strong,
        .meta span {
            display: block;
        }

        .meta span {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 2px;
        }

        .content {
            padding: 18px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .media {
            display: grid;
            gap: 10px;
            padding: 0 18px 18px;
        }

        .media img,
        .media video {
            width: 100%;
            display: block;
            border-radius: 16px;
            background: #000;
        }

        .footer {
            padding: 0 18px 18px;
        }

        .footer a {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <main>
        <h1>X media removed</h1>
        <p>The scraper bridge and X viewer have been removed from this repo.</p>

        <div class="notice">
            <strong>This page is no longer interactive.</strong>
            X media loading, local endpoints, and bridge instructions were intentionally removed.
        </div>
    </main>
</body>
</html>
