<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MazeNote | Maze_Development</title>
    <link rel="icon" href="img/logo.svg" type="image/svg"/>
    <link rel="icon" href="img/logo_black.svg" type="image/svg" media="(prefers-color-scheme: light)"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==================== RESET & ROOT ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark:          #0a0a0a;
            --bg-secondary:     #151515;
            --bg-card:          #1a1a1a;
            --bg-card-hover:    #202020;
            --text-primary:     #ffffff;
            --text-secondary:   #a0a0a0;
            --accent-purple:    #c772fe;
            --accent-dim:       rgba(199,114,254,0.12);
            --border-color:     #2a2a2a;
            --border-hover:     #3a3a3a;
            --danger:           #ff5555;
            --success:          #55cc88;

            /* note card accent colours */
            --note-yellow:      #3a3010;
            --note-yellow-b:    #665520;
            --note-blue:        #0e1f3a;
            --note-blue-b:      #1a3360;
            --note-green:       #0e2a1a;
            --note-green-b:     #1a4a2a;
            --note-red:         #2a0e0e;
            --note-red-b:       #4a1a1a;
            --note-default:     #1a1a1a;
            --note-default-b:   #2a2a2a;
        }

        html, body {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-purple); }

        /* ==================== AUTH GATE ==================== */
        #auth-gate {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-dark);
            z-index: 9999;
        }
        #auth-gate.hidden { display: none; }

        .gate-box {
            text-align: center;
            padding: 3rem 2rem;
        }
        .gate-logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }
        .gate-logo span { color: var(--accent-purple); }
        .gate-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .gate-btn {
            display: inline-block;
            padding: 0.65rem 1.8rem;
            border: 1px solid var(--accent-purple);
            color: var(--accent-purple);
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            transition: background 0.2s, color 0.2s;
        }
        .gate-btn:hover { background: var(--accent-purple); color: #fff; }

        /* ==================== TOP BAR ==================== */
        #topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 48px;
            background: rgba(10,10,10,0.97);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0 1rem;
            z-index: 1000;
            user-select: none;
        }

        .topbar-logo {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            text-decoration: none;
            flex-shrink: 0;
        }
        .topbar-logo span { color: var(--accent-purple); }

        .topbar-sep {
            width: 1px; height: 20px;
            background: var(--border-color);
            margin: 0 0.25rem;
            flex-shrink: 0;
        }

        /* Board selector */
        #board-selector-wrap {
            display: flex; align-items: center; gap: 0.35rem;
            flex-shrink: 0;
        }
        #board-name-display {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border: 1px solid transparent;
            transition: border-color 0.2s;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #board-name-display:hover { border-color: var(--border-color); }

        .topbar-icon-btn {
            background: none;
            border: 1px solid transparent;
            color: var(--text-secondary);
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .topbar-icon-btn:hover { border-color: var(--border-color); color: var(--text-primary); }
        .topbar-icon-btn.active { border-color: var(--accent-purple); color: var(--accent-purple); }

        .topbar-spacer { flex: 1; }

        /* zoom display */
        #zoom-display {
            font-size: 0.72rem;
            color: var(--text-secondary);
            min-width: 42px;
            text-align: center;
            cursor: pointer;
            padding: 0.25rem 0.4rem;
        }
        #zoom-display:hover { color: var(--text-primary); }

        /* user chip */
        .user-chip {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .user-avatar {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid var(--accent-purple);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--accent-purple);
            overflow: hidden;
            flex-shrink: 0;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .btn-signout {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.72rem;
            padding: 0.25rem 0.7rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-signout:hover { border-color: var(--danger); color: var(--danger); }

        /* ==================== TOOL PALETTE ==================== */
        #palette {
            position: fixed;
            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            z-index: 900;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(10,10,10,0.95);
            border: 1px solid var(--border-color);
            padding: 6px;
        }

        .pal-btn {
            background: none;
            border: 1px solid transparent;
            color: var(--text-secondary);
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
            font-size: 1rem;
            position: relative;
        }
        .pal-btn:hover { border-color: var(--accent-purple); color: var(--accent-purple); }
        .pal-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }
        .pal-btn[title]:hover::after {
            content: attr(title);
            position: absolute;
            left: calc(100% + 10px);
            top: 50%;
            transform: translateY(-50%);
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.7rem;
            white-space: nowrap;
            padding: 0.25rem 0.55rem;
            pointer-events: none;
            z-index: 9999;
        }

        /* ==================== CANVAS WRAPPER ==================== */
        #canvas-wrap {
            position: fixed;
            inset: 48px 0 0 0;
            overflow: hidden;
            cursor: default;
        }
        #canvas-wrap.panning { cursor: grabbing; }
        #canvas-wrap.tool-select { cursor: default; }
        #canvas-wrap.tool-pan { cursor: grab; }
        #canvas-wrap.tool-pan.panning { cursor: grabbing; }

        /* The infinite canvas */
        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            transform-origin: 0 0;
        }

        /* Grid dots background */
        #canvas-bg {
            position: fixed;
            inset: 48px 0 0 0;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle, #2a2a2a 1px, transparent 1px);
            background-size: 28px 28px;
        }

        /* ==================== SELECTION BOX ==================== */
        #selection-box {
            position: absolute;
            border: 1px solid var(--accent-purple);
            background: rgba(199,114,254,0.07);
            pointer-events: none;
            display: none;
            z-index: 500;
        }

        /* ==================== CARDS ==================== */
        .board-card {
            position: absolute;
            min-width: 200px;
            max-width: 340px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            user-select: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .board-card:hover { border-color: var(--border-hover); }
        .board-card.selected {
            border-color: var(--accent-purple) !important;
            box-shadow: 0 0 0 2px rgba(199,114,254,0.25);
        }
        .board-card.dragging {
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            z-index: 200;
        }

        /* card drag handle / top bar */
        .card-handle {
            height: 28px;
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center;
            padding: 0 6px;
            gap: 4px;
            cursor: grab;
            flex-shrink: 0;
        }
        .card-handle:active { cursor: grabbing; }
        .card-handle-icon {
            font-size: 0.72rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .card-handle-title {
            flex: 1;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-action-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            transition: color 0.15s;
            flex-shrink: 0;
        }
        .card-action-btn:hover { color: var(--danger); }

        .card-body {
            padding: 0.6rem 0.7rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        /* Resize handle */
        .card-resize {
            position: absolute;
            bottom: 0; right: 0;
            width: 14px; height: 14px;
            cursor: se-resize;
            z-index: 10;
        }
        .card-resize::after {
            content: '';
            position: absolute;
            bottom: 3px; right: 3px;
            width: 6px; height: 6px;
            border-right: 2px solid #444;
            border-bottom: 2px solid #444;
        }

        /* ── NOTE CARD ── */
        .card-note .card-handle { background: transparent; }
        .card-note[data-color="yellow"] { background: var(--note-yellow); border-color: var(--note-yellow-b); }
        .card-note[data-color="blue"]   { background: var(--note-blue);   border-color: var(--note-blue-b);   }
        .card-note[data-color="green"]  { background: var(--note-green);  border-color: var(--note-green-b);  }
        .card-note[data-color="red"]    { background: var(--note-red);    border-color: var(--note-red-b);    }

        .note-textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            line-height: 1.55;
            resize: none;
            min-height: 80px;
            overflow: hidden;
        }
        .note-textarea::placeholder { color: #555; }

        /* colour picker (props panel only) */
        .color-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid transparent;
            transition: border-color 0.15s, transform 0.15s;
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { border-color: var(--text-primary); }
        .color-dot[data-c="default"] { background: #3a3a3a; }
        .color-dot[data-c="yellow"]  { background: #ccaa3c; }
        .color-dot[data-c="blue"]    { background: #4488ee; }
        .color-dot[data-c="green"]   { background: #44bb77; }
        .color-dot[data-c="red"]     { background: #ee4444; }

        /* ── LINK CARD ── */
        .card-link .link-preview {
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
            text-decoration: none;
            color: inherit;
        }
        .link-favicon {
            width: 20px; height: 20px;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-radius: 3px;
            object-fit: contain;
        }
        .link-info { flex: 1; min-width: 0; }
        .link-title {
            font-size: 0.82rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .link-url {
            font-size: 0.68rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .link-open-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.3rem;
            font-size: 0.7rem;
            color: var(--accent-purple);
            text-decoration: none;
            cursor: pointer;
        }
        .link-open-btn:hover { text-decoration: underline; }

        /* ── IMAGE CARD ── */
        .card-image .img-wrap {
            width: 100%;
            min-height: 80px;
            background: var(--bg-secondary);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .card-image .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .img-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            color: #555;
            font-size: 0.75rem;
        }
        .img-caption {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-secondary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.75rem;
            padding-top: 0.25rem;
            resize: none;
        }
        .img-caption::placeholder { color: #444; }

        /* ── TODO CARD ── */
        .card-todo .todo-list {
            display: flex; flex-direction: column; gap: 0.3rem;
        }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        /* Custom dark checkbox */
        .todo-check {
            appearance: none;
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border: 1px solid #555;
            background: #111;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            transition: border-color 0.15s, background 0.15s;
        }
        .todo-check:checked {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
        }
        .todo-check:checked::after {
            content: '';
            position: absolute;
            left: 3px; top: 1px;
            width: 5px; height: 8px;
            border: 1.5px solid #fff;
            border-top: none; border-left: none;
            transform: rotate(40deg);
        }
        .todo-text {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid transparent;
            outline: none;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.82rem;
            padding: 0.05rem 0;
            min-width: 0;
            transition: border-color 0.15s;
        }
        .todo-text:focus { border-bottom-color: var(--border-color); }
        .todo-text::placeholder { color: #444; }
        .todo-item.done .todo-text { text-decoration: line-through; color: #555; }

        .todo-del-btn {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0 2px;
            transition: color 0.15s;
            flex-shrink: 0;
        }
        .todo-del-btn:hover { color: var(--danger); }

        .todo-add-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding-top: 0.2rem;
            cursor: pointer;
            color: #555;
            font-size: 0.75rem;
            transition: color 0.15s;
        }
        .todo-add-row:hover { color: var(--accent-purple); }

        /* ── CONNECTOR LAYER (SVG inside #canvas) ── */
        #connector-svg {
            position: fixed;
            inset: 48px 0 0 0;
            width: 100%; height: 100%;
            overflow: visible;
            pointer-events: none;
            z-index: 50;
        }
        #connector-svg .conn-hitbox {
            pointer-events: stroke;
        }
        .connector-path {
            fill: none; stroke-width: 2;
            transition: stroke 0.15s;
        }
        .connector-path.selected { stroke: var(--accent-purple) !important; }
        .connector-hitbox {
            fill: none; stroke: transparent; stroke-width: 14;
            pointer-events: stroke; cursor: pointer;
        }

        /* ── CONNECTION PORT DOTS ── */
        #canvas-wrap.tool-line { cursor: crosshair; }
        #canvas-wrap.tool-line .board-card { overflow: visible; }
        .conn-port {
            position: absolute;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--accent-purple);
            border: 2px solid rgba(0,0,0,0.85);
            opacity: 0;
            z-index: 20;
            transition: opacity 0.12s, transform 0.12s;
            box-shadow: 0 0 0 3px rgba(199,114,254,0.25);
            pointer-events: none;  /* default off */
        }
        .conn-port[data-port="top"]    { top: -8px;    left: 50%; transform: translateX(-50%) scale(0.5); }
        .conn-port[data-port="bottom"] { bottom: -8px; left: 50%; transform: translateX(-50%) scale(0.5); }
        .conn-port[data-port="left"]   { left: -8px;   top: 50%;  transform: translateY(-50%) scale(0.5); }
        .conn-port[data-port="right"]  { right: -8px;  top: 50%;  transform: translateY(-50%) scale(0.5); }
        /* In line mode: always interactive + visible on card hover */
        .tool-line .board-card .conn-port { pointer-events: auto; }
        .tool-line .board-card:hover .conn-port { opacity: 1; }
        .tool-line .board-card:hover .conn-port[data-port="top"]    { transform: translateX(-50%) scale(1); }
        .tool-line .board-card:hover .conn-port[data-port="bottom"] { transform: translateX(-50%) scale(1); }
        .tool-line .board-card:hover .conn-port[data-port="left"]   { transform: translateY(-50%) scale(1); }
        .tool-line .board-card:hover .conn-port[data-port="right"]  { transform: translateY(-50%) scale(1); }
        .conn-port.port-snap { opacity: 1 !important; background: #fff !important; }
        .conn-port.port-snap[data-port="top"]    { transform: translateX(-50%) scale(1.2) !important; }
        .conn-port.port-snap[data-port="bottom"] { transform: translateX(-50%) scale(1.2) !important; }
        .conn-port.port-snap[data-port="left"]   { transform: translateY(-50%) scale(1.2) !important; }
        .conn-port.port-snap[data-port="right"]  { transform: translateY(-50%) scale(1.2) !important; }
        /* Style picker reused in connector props panel */
        .line-style-btn {
            background: none; border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 0.7rem; padding: 2px 7px;
            cursor: pointer; transition: border-color 0.15s, color 0.15s;
            font-family: 'Poppins', sans-serif;
        }
        .line-style-btn.active, .line-style-btn:hover { border-color: var(--accent-purple); color: var(--accent-purple); }

        /* ── COLUMN CARD (open container) ── */

        /* ── COLUMN CARD (open container) ── */
        .card-column {
            background: rgba(255,255,255,0.025) !important;
            border: 1.5px dashed rgba(255,255,255,0.15) !important;
            box-shadow: none !important;
            z-index: 2 !important;  /* behind regular cards */
            min-width: 280px;
            min-height: 320px;
        }
        .card-column:hover {
            border-color: rgba(199,114,254,0.35) !important;
        }
        .card-column.drop-target {
            border-color: var(--accent-purple) !important;
            background: rgba(199,114,254,0.05) !important;
        }
        .card-column .card-handle {
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .card-column .column-hint {
            position: absolute;
            bottom: 16px; left: 50%; transform: translateX(-50%);
            font-size: 0.7rem; color: #333;
            white-space: nowrap;
            pointer-events: none;
        }

        /* ── COMMENT CARD ── */
        .card-comment { max-width: 300px; }
        .comment-author {
            font-size: 0.7rem; font-weight: 600;
            color: var(--accent-purple); margin-bottom: 0.35rem;
        }
        .comment-textarea {
            width: 100%; background: transparent; border: none; outline: none;
            color: var(--text-primary); font-family: 'Poppins', sans-serif;
            font-size: 0.82rem; line-height: 1.5; resize: none;
            min-height: 60px; overflow: hidden;
        }
        .comment-textarea::placeholder { color: #555; }
        .comment-tail {
            position: absolute;
            bottom: -10px; left: 14px;
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 4px solid transparent;
            border-top: 10px solid var(--border-color);
        }
        .comment-tail-inner {
            position: absolute;
            bottom: -9px; left: 14px;
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 4px solid transparent;
            border-top: 10px solid var(--bg-card);
            z-index: 1;
        }
        .card-comment { padding-bottom: 12px; overflow: visible; }

        /* ── TABLE CARD ── */
        .card-table .table-wrap { overflow: auto; }
        .card-table table {
            width: 100%; border-collapse: collapse;
            font-size: 0.78rem;
        }
        .card-table td {
            border: 1px solid var(--border-color);
            padding: 0; min-width: 70px;
        }
        .card-table td input {
            width: 100%; background: transparent; border: none; outline: none;
            color: var(--text-primary); font-family: 'Poppins', sans-serif;
            font-size: 0.78rem; padding: 0.3rem 0.4rem;
        }
        .card-table thead td { background: rgba(255,255,255,0.04); }
        .card-table thead td input { font-weight: 600; }
        .table-add-col, .table-add-row-btn {
            background: none; border: 1px dashed var(--border-color);
            color: var(--text-secondary); font-family: 'Poppins', sans-serif;
            font-size: 0.7rem; cursor: pointer; padding: 0.2rem 0.5rem;
            transition: border-color 0.15s, color 0.15s;
        }
        .table-add-col:hover, .table-add-row-btn:hover { border-color: var(--accent-purple); color: var(--accent-purple); }
        .table-controls {
            display: flex; gap: 0.4rem;
            padding: 0.3rem 0.7rem 0.5rem;
            border-top: 1px solid var(--border-color);
        }

        /* ── DRAG-DROP OVERLAY ── */
        #drop-overlay {
            position: fixed;
            inset: 48px 0 0 0;
            background: rgba(199,114,254,0.08);
            border: 2px dashed var(--accent-purple);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9000;
            pointer-events: none;
        }
        #drop-overlay.active { display: flex; }
        .drop-overlay-label {
            color: var(--accent-purple);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            pointer-events: none;
        }

        /* ── DRAW CARD ── */
        .draw-canvas {
            display: block;
            cursor: crosshair;
            background: var(--bg-secondary);
            width: 100%;
        }
        .draw-toolbar {
            display: flex; align-items: center; gap: 6px;
            padding: 0.3rem 0.7rem 0.4rem;
            border-top: 1px solid var(--border-color);
        }
        .draw-color-swatch {
            width: 16px; height: 16px;
            border-radius: 50%; border: 1px solid #555;
            cursor: pointer; flex-shrink: 0;
        }
        .draw-size-slider { flex: 1; accent-color: var(--accent-purple); cursor: pointer; }
        .draw-clear-btn {
            background: none; border: 1px solid var(--border-color);
            color: var(--text-secondary); font-family: 'Poppins', sans-serif;
            font-size: 0.65rem; padding: 2px 6px; cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }
        .draw-clear-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* ==================== PROPERTIES PANEL ====================*/
        #props-panel {
            position: fixed;
            top: 48px; right: 0;
            width: 220px;
            height: calc(100vh - 48px);
            background: rgba(10,10,10,0.97);
            border-left: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            z-index: 800;
            display: flex; flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.22s ease;
        }
        #props-panel.open { transform: translateX(0); }
        .props-header {
            display: flex; align-items: center;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border-color);
            gap: 0.5rem;
        }
        .props-title {
            flex: 1; font-size: 0.78rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--text-secondary);
        }
        .props-body { padding: 0.85rem 1rem; display: flex; flex-direction: column; gap: 0.85rem; overflow-y: auto; }
        .prop-row { display: flex; flex-direction: column; gap: 0.3rem; }
        .prop-label {
            font-size: 0.65rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.07em;
            color: var(--text-secondary);
        }
        .prop-input {
            width: 100%; padding: 0.4rem 0.6rem;
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            color: var(--text-primary); font-family: 'Poppins', sans-serif;
            font-size: 0.8rem; outline: none; transition: border-color 0.2s;
        }
        .prop-input:focus { border-color: var(--accent-purple); }
        .prop-color-row { display: flex; gap: 5px; flex-wrap: wrap; }
        .prop-del-btn {
            width: 100%; margin-top: 0.5rem;
            padding: 0.5rem; background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary); font-family: 'Poppins', sans-serif;
            font-size: 0.78rem; cursor: pointer; transition: border-color 0.2s, color 0.2s;
        }
        .prop-del-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* ==================== BOARDS SIDEBAR ==================== */
        #boards-sidebar {
            position: fixed;
            top: 48px; left: 0;
            width: 240px;
            height: calc(100vh - 48px);
            background: rgba(10,10,10,0.97);
            border-right: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column;
            z-index: 800;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
        }
        #boards-sidebar.open { transform: translateX(0); }

        .sidebar-header {
            display: flex;
            align-items: center;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border-color);
            gap: 0.5rem;
        }
        .sidebar-title {
            flex: 1;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
        }
        .sidebar-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            line-height: 1;
            transition: color 0.15s;
        }
        .sidebar-close:hover { color: var(--text-primary); }

        .sidebar-body { flex: 1; overflow-y: auto; padding: 0.5rem 0; }

        .board-item {
            padding: 0.55rem 1rem;
            font-size: 0.82rem;
            cursor: pointer;
            display: flex; align-items: center; gap: 0.5rem;
            color: var(--text-secondary);
            border-left: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }
        .board-item:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
        .board-item.active { color: var(--text-primary); border-left-color: var(--accent-purple); background: rgba(199,114,254,0.07); }
        .board-item-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .board-item-del {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 0.7rem;
            transition: color 0.15s;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }
        .board-item:hover .board-item-del { opacity: 1; }
        .board-item-del:hover { color: var(--danger); }

        .sidebar-footer {
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border-color);
        }
        .btn-new-board {
            width: 100%;
            background: transparent;
            border: 1px dashed var(--border-color);
            color: var(--text-secondary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.78rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
        }
        .btn-new-board:hover { border-color: var(--accent-purple); color: var(--accent-purple); }

        /* ==================== MODAL ==================== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 9000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1.75rem 2rem;
            width: 100%;
            max-width: 420px;
            position: relative;
        }
        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
        }
        .modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            transition: color 0.15s;
        }
        .modal-close:hover { color: var(--text-primary); }

        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            margin-bottom: 0.35rem;
        }
        .form-input {
            width: 100%;
            padding: 0.6rem 0.85rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--accent-purple); }

        .btn-primary {
            width: 100%;
            padding: 0.65rem 1.5rem;
            background: transparent;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-primary:hover { background: var(--accent-purple); border-color: var(--accent-purple); }

        /* ==================== TOAST ==================== */
        #toast-container {
            position: fixed;
            bottom: 1.5rem; right: 1.5rem;
            z-index: 9999;
            display: flex; flex-direction: column; gap: 0.5rem;
            pointer-events: none;
        }
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.78rem;
            padding: 0.55rem 1rem;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            max-width: 280px;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error   { border-color: var(--danger);  color: var(--danger);  }

        /* ==================== MEDIA LIBRARY PANEL ==================== */
        #media-panel {
            position: fixed;
            top: 48px; right: 0;
            width: 300px;
            height: calc(100vh - 48px);
            background: rgba(10,10,10,0.97);
            border-left: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            z-index: 850;
            display: flex; flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease;
        }
        #media-panel.open { transform: translateX(0); }
        .media-panel-header {
            display: flex; align-items: center;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border-color);
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .media-panel-title {
            flex: 1; font-size: 0.78rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--text-secondary);
        }
        .media-panel-search {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.78rem;
            padding: 0.35rem 0.65rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .media-panel-search:focus { border-color: var(--accent-purple); }
        .media-panel-search::placeholder { color: #555; }
        .media-panel-filter {
            display: flex; gap: 4px;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .media-filter-pill {
            font-size: 0.65rem; padding: 0.18rem 0.55rem;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            background: none;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.15s, color 0.15s;
        }
        .media-filter-pill.active {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }
        .media-panel-body {
            flex: 1; overflow-y: auto;
            padding: 0.6rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            align-content: start;
        }
        .media-thumb {
            position: relative;
            aspect-ratio: 16/10;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .media-thumb:hover { border-color: var(--accent-purple); }
        .media-thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.2s;
        }
        .media-thumb:hover img { transform: scale(1.05); }
        .media-thumb-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.72);
            font-size: 0.6rem; color: #ccc;
            padding: 2px 5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .media-thumb-type {
            position: absolute; top: 4px; right: 4px;
            background: rgba(0,0,0,0.75);
            font-size: 0.55rem; color: var(--accent-purple);
            padding: 1px 4px; text-transform: uppercase; letter-spacing: 0.06em;
        }
        .media-thumb-icon {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            color: #444; font-size: 1.5rem;
        }
        .media-thumb-play {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .media-thumb:hover .media-thumb-play { opacity: 1; }
        .media-panel-empty {
            grid-column: 1/-1;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.78rem;
            padding: 2rem 1rem;
        }

        /* ==================== SAVING INDICATOR ==================== */
        #save-indicator {
            position: fixed;
            bottom: 0.6rem; left: 50%;
            transform: translateX(-50%);
            font-size: 0.68rem;
            color: var(--text-secondary);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 800;
        }
        #save-indicator.visible { opacity: 1; }

        /* ==================== LOADING ==================== */
        #app-loading {
            position: fixed; inset: 0;
            background: var(--bg-dark);
            display: flex; align-items: center; justify-content: center;
            z-index: 9998;
        }
        #app-loading.hidden { display: none; }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-purple);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="app-loading"><div class="spinner"></div></div>

    <!-- Auth gate -->
    <div id="auth-gate" class="hidden">
        <div class="gate-box">
            <div class="gate-logo">MAZE<span>_</span>NOTE</div>
            <p class="gate-subtitle">Sign in to your boards.</p>
            <a href="login.html?redirect=mazenote.html" class="gate-btn">Sign In</a>
        </div>
    </div>

    <!-- Top bar -->
    <div id="topbar">
        <a href="index.html" class="topbar-logo">MAZE<span>_</span>NOTE</a>
        <div class="topbar-sep"></div>

        <!-- Boards toggle -->
        <button class="topbar-icon-btn" id="btn-boards-toggle" title="Boards" onclick="toggleSidebar()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
        </button>

        <div id="board-selector-wrap">
            <span id="board-name-display" onclick="openRenameBoardModal()" title="Click to rename">Untitled Board</span>
        </div>

        <div class="topbar-sep"></div>
        <span id="zoom-display" onclick="resetZoom()" title="Reset zoom">100%</span>
        <button class="topbar-icon-btn" title="Zoom out" onclick="adjustZoom(-0.1)">−</button>
        <button class="topbar-icon-btn" title="Zoom in"  onclick="adjustZoom(+0.1)">+</button>
        <button class="topbar-icon-btn" title="Fit to screen" onclick="fitToScreen()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
        </button>

        <div class="topbar-spacer"></div>

        <!-- Media Library toggle -->
        <button class="topbar-icon-btn" id="btn-media-toggle" title="Media Library" onclick="toggleMediaPanel()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
        </button>
        <div class="topbar-sep"></div>

        <div class="user-chip" id="user-chip">
            <div class="user-avatar" id="user-avatar"><span id="user-initials">?</span></div>
            <span id="user-name-display"></span>
        </div>
        <button class="btn-signout" onclick="signOut()">Sign Out</button>
    </div>

    <!-- Boards sidebar -->
    <div id="boards-sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Boards</span>
            <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
        </div>
        <div class="sidebar-body" id="boards-list"></div>
        <div class="sidebar-footer">
            <button class="btn-new-board" onclick="createNewBoard()">+ New Board</button>
        </div>
    </div>

    <!-- Tool palette -->
    <div id="palette">
        <button class="pal-btn active" id="tool-select" title="Select / Move" onclick="setTool('select')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M4 0l16 12-7 1-4 8z"/></svg>
        </button>
        <button class="pal-btn" id="tool-pan" title="Pan (Space)" onclick="setTool('pan')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8l-2-2a1.5 1.5 0 0 0-2 2l3 5a4 4 0 0 0 3.5 2h4a4 4 0 0 0 4-4v-4a2 2 0 0 0-4 0z"/>
            </svg>
        </button>

        <div style="height:1px;background:var(--border-color);margin:2px 0;"></div>

        <button class="pal-btn" id="tool-note" title="Note" onclick="addCard('note')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/>
            </svg>
        </button>
        <button class="pal-btn" id="tool-link" title="Link" onclick="addCard('link')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
        </button>
        <button class="pal-btn" id="tool-todo" title="To-Do" onclick="addCard('todo')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
        </button>
        <button class="pal-btn" id="tool-line" title="Connect cards with a line" onclick="setTool('line')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="5" y1="19" x2="19" y2="5"/>
                <polyline points="15 5 19 5 19 9"/>
            </svg>
        </button>
        <button class="pal-btn" id="tool-column" title="Column" onclick="addCard('column')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="1"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="3" y1="15" x2="21" y2="15"/>
            </svg>
        </button>
        <button class="pal-btn" id="tool-comment" title="Comment" onclick="addCard('comment')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
        </button>
        <button class="pal-btn" id="tool-table" title="Table" onclick="addCard('table')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="1"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="12" y1="3" x2="12" y2="21"/>
            </svg>
        </button>
        <button class="pal-btn" id="tool-image" title="Add Image" onclick="addCard('image')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
        </button>
        <button class="pal-btn" id="tool-draw" title="Draw" onclick="addCard('draw')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                <path d="M2 2l7.586 7.586"/>
                <circle cx="11" cy="11" r="2"/>
            </svg>
        </button>

        <div style="height:1px;background:var(--border-color);margin:2px 0;"></div>

            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <path d="M9 6V4h6v2"/>

        </button>

    <!-- Save indicator -->
