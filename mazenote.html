    <!-- Toast container -->
    <div id="toast-container"></div>

    <script type="module">
        // ─── FIREBASE CONFIG SWITCH ─────────────────────────────────────────
        const USE_LOCAL_CONFIG = 'auto';
        const isLocal = USE_LOCAL_CONFIG === true ||
            (USE_LOCAL_CONFIG === 'auto' &&
             (location.hostname === 'localhost' || location.hostname === '127.0.0.1'));

        let firebaseConfig;
        if (isLocal) {
            try { ({ firebaseConfig } = await import('./firebase.local.js')); }
            catch { ({ firebaseConfig } = await import('./firebase.js')); }
        } else {
            ({ firebaseConfig } = await import('./firebase.js'));
        }

        if (!firebaseConfig.apiKey || firebaseConfig.apiKey.startsWith('%%')) {
            document.body.innerHTML = `<div style="font-family:monospace;color:#ff5555;background:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;">
                <p>⚠️ Firebase is not configured.</p></div>`;
            throw new Error('Firebase config placeholders not substituted.');
        }

        const { initializeApp: _ia } = await import("https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js");
        const { getAuth: _ga, onAuthStateChanged: _oac, signOut: _so } = await import("https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js");
        const { getFirestore: _gfs, collection: _col, doc: _doc, getDocs: _gds, setDoc: _sd, deleteDoc: _dd, onSnapshot: _ons, serverTimestamp: _st, query: _query, orderBy: _orderBy } = await import("https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js");

        const app  = _ia(firebaseConfig);
        const auth = _ga(app);
        const db   = _gfs(app);

        // ─── STATE ───────────────────────────────────────────────────────────
        let currentUser = null;
        let boards = [];            // [{id, name, createdAt}]
        let activeBoardId = null;
        let cards = [];             // local copy of cards on current board
        let boardsUnsubscribe = null;
        let cardsUnsubscribe = null;

        // Canvas pan/zoom
        let panX = 0, panY = 0, zoom = 1;
        const MIN_ZOOM = 0.2, MAX_ZOOM = 3;

        // Interaction state
        let activeTool = 'select';
        let isPanning = false;
        let panStartX = 0, panStartY = 0, panStartViewX = 0, panStartViewY = 0;
        let isDraggingCard = false;
        let dragCardId = null, dragOffX = 0, dragOffY = 0;
        let isResizing = false;
        let resizeCardId = null, resizeStartW = 0, resizeStartH = 0, resizeStartMx = 0, resizeStartMy = 0;
        let isSelecting = false;
        let selBoxStartX = 0, selBoxStartY = 0;
        let selectedCardIds = new Set();

        // Connections (SVG arrows between cards)
        let connections = [];
        let connectionsUnsubscribe = null;
        let isConnecting = false;
        let connectingFrom = null; // { cardId, port }
        let tempConnLine = null;   // SVG path during drag
        let selectedConnId = null;

        // Pending modal state
        let pendingCardPos = { x: 400, y: 200 };

        // Save debounce
        let saveTimer = null;

        // ─── DOM REFS ────────────────────────────────────────────────────────
        const DOM = {
            appLoading:     document.getElementById('app-loading'),
            authGate:       document.getElementById('auth-gate'),
            topbar:         document.getElementById('topbar'),
            palette:        document.getElementById('palette'),
            canvasWrap:     document.getElementById('canvas-wrap'),
            canvas:         document.getElementById('canvas'),
            canvasBg:       document.getElementById('canvas-bg'),
            boardsSidebar:  document.getElementById('boards-sidebar'),
            boardsList:     document.getElementById('boards-list'),
            boardNameDisp:  document.getElementById('board-name-display'),
            zoomDisplay:    document.getElementById('zoom-display'),
            userAvatar:     document.getElementById('user-avatar'),
            userInitials:   document.getElementById('user-initials'),
            userNameDisplay:document.getElementById('user-name-display'),
            selectionBox:   document.getElementById('selection-box'),
            saveIndicator:  document.getElementById('save-indicator'),
            toastContainer: document.getElementById('toast-container'),
        };

        // ─── AUTH ────────────────────────────────────────────────────────────
        _oac(auth, async (user) => {
            DOM.appLoading.classList.add('hidden');
            if (!user) {
                DOM.authGate.classList.remove('hidden');
                return;
            }
            DOM.authGate.classList.add('hidden');
            currentUser = user;
            setupUserChip(user);
            await loadBoards();
        });

        function setupUserChip(user) {
            const name = user.displayName || user.email || 'User';
            DOM.userNameDisplay.textContent = name.split(' ')[0];
            if (user.photoURL) {
                DOM.userAvatar.innerHTML = `<img src="${sanitizeUrl(user.photoURL)}" alt="">`;
            } else {
                DOM.userInitials.textContent = name.charAt(0).toUpperCase();
            }
        }

        window.signOut = async () => {
            await _so(auth);
            window.location.href = 'login.html';
        };

        // ─── BOARDS ──────────────────────────────────────────────────────────
        async function loadBoards() {
            const ref = _col(db, 'users', currentUser.uid, 'boards');
            if (boardsUnsubscribe) boardsUnsubscribe();
            boardsUnsubscribe = _ons(ref, snap => {
                boards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                boards.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                renderBoardsList();
                if (!activeBoardId) {
                    if (boards.length > 0) {
                        loadBoard(boards[0].id);
                    } else {
                        createNewBoard();
                    }
                }
            });
        }

        function renderBoardsList() {
            DOM.boardsList.innerHTML = '';
            boards.forEach(b => {
                const el = document.createElement('div');
                el.className = 'board-item' + (b.id === activeBoardId ? ' active' : '');
                el.innerHTML = `
                    <span class="board-item-name">${escHtml(b.name || 'Untitled')}</span>
                    <button class="board-item-del" onclick="deleteBoardById('${b.id}', event)" title="Delete board">✕</button>`;
                el.addEventListener('click', () => { loadBoard(b.id); toggleSidebar(true); });
                DOM.boardsList.appendChild(el);
            });
        }

        window.createNewBoard = async () => {
            if (!currentUser) return;
            const newId = 'board_' + Date.now();
            const boardRef = _doc(db, 'users', currentUser.uid, 'boards', newId);
            await _sd(boardRef, { name: 'New Board', createdAt: _st() });
            loadBoard(newId);
            toggleSidebar(true);
        };

        window.deleteBoardById = async (boardId, e) => {
            e.stopPropagation();
            if (!confirm('Delete this board and all its cards?')) return;
            if (boardId === activeBoardId) {
                activeBoardId = null;
                DOM.canvas.innerHTML = '<div id="selection-box"></div>';
                cards = [];
            }
            await _dd(_doc(db, 'users', currentUser.uid, 'boards', boardId));
            // Cascade-delete cards
            const cardsRef = _col(db, 'users', currentUser.uid, 'boards', boardId, 'cards');
            const snap = await _gds(cardsRef);
            await Promise.all(snap.docs.map(d => _dd(d.ref)));
            showToast('Board deleted');
        };

        function loadBoard(boardId) {
            if (cardsUnsubscribe) { cardsUnsubscribe(); cardsUnsubscribe = null; }
            activeBoardId = boardId;

            // Clear canvas
            DOM.canvas.innerHTML = '<div id="selection-box"></div>';
            DOM.selectionBox = document.getElementById('selection-box');
            // Clear connector SVG
            const connGroup = document.getElementById('connector-group');
            if (connGroup) connGroup.innerHTML = '';
            cards = [];
            connections = [];
            selectedCardIds.clear();
            selectedConnId = null;
            if (connectionsUnsubscribe) { connectionsUnsubscribe(); connectionsUnsubscribe = null; }

            // Update displayed board name
            const board = boards.find(b => b.id === boardId);
            DOM.boardNameDisp.textContent = board?.name || 'Untitled Board';
            renderBoardsList();

            // Subscribe to cards
            const cardsRef = _col(db, 'users', currentUser.uid, 'boards', boardId, 'cards');
            cardsUnsubscribe = _ons(cardsRef, snap => {
                snap.docChanges().forEach(change => {
                    const data = { id: change.doc.id, ...change.doc.data() };
                    if (change.type === 'added') {
                        // Skip if already added locally (optimistic pre-push before save)
                        if (!cards.find(c => c.id === data.id)) {
                            cards.push(data);
                            renderCard(data);
                        }
                    } else if (change.type === 'modified') {
                        const idx = cards.findIndex(c => c.id === data.id);
                        if (idx !== -1) cards[idx] = data;
                        syncCardDOM(data);
                    } else if (change.type === 'removed') {
                        cards = cards.filter(c => c.id !== data.id);
                        document.getElementById('card-' + data.id)?.remove();
                    }
                });
                renderConnectors();
            });

            // Subscribe to connections
            const connsRef = _col(db, 'users', currentUser.uid, 'boards', boardId, 'connections');
            connectionsUnsubscribe = _ons(connsRef, snap => {
                connections = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderConnectors();
            });
        }

        window.openRenameBoardModal = () => {
            if (!activeBoardId) return;
            const board = boards.find(b => b.id === activeBoardId);
            document.getElementById('rename-board-input').value = board?.name || '';
            openModal('modal-rename-board');
            setTimeout(() => document.getElementById('rename-board-input').focus(), 50);
        };

        window.confirmRenameBoard = async () => {
            const name = document.getElementById('rename-board-input').value.trim();
            if (!name || !activeBoardId) return;
            await _sd(_doc(db, 'users', currentUser.uid, 'boards', activeBoardId),
                { name, updatedAt: _st() }, { merge: true });
            DOM.boardNameDisp.textContent = name;
            closeModal('modal-rename-board');
        };

        // ─── VIEWPORT TRANSFORM ──────────────────────────────────────────────
        function applyTransform() {
            DOM.canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
            DOM.zoomDisplay.textContent = Math.round(zoom * 100) + '%';
            // Shift bg grid to follow pan
            DOM.canvasBg.style.backgroundPosition = `${panX % 28}px ${(panY + 48) % 28}px`;
            // Keep connector SVG group in sync with canvas transform
            const cg = document.getElementById('connector-group');
            if (cg) cg.setAttribute('transform', `translate(${panX} ${panY}) scale(${zoom})`);
        }

        window.adjustZoom = (delta) => {
            const ww = DOM.canvasWrap.clientWidth;
            const wh = DOM.canvasWrap.clientHeight;
            const cx = ww / 2, cy = wh / 2;
            const newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom + delta));
            panX = cx - (cx - panX) * (newZoom / zoom);
            panY = cy - (cy - panY) * (newZoom / zoom);
            zoom = newZoom;
            applyTransform();
        };

        window.resetZoom = () => {
            zoom = 1; panX = 0; panY = 0;
            applyTransform();
        };

        window.fitToScreen = () => {
            if (cards.length === 0) { resetZoom(); return; }
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            cards.forEach(c => {
                minX = Math.min(minX, c.x);
                minY = Math.min(minY, c.y);
                maxX = Math.max(maxX, c.x + (c.width || 240));
                maxY = Math.max(maxY, c.y + (c.height || 200));
            });
            const pad = 80;
            const ww = DOM.canvasWrap.clientWidth;
            const wh = DOM.canvasWrap.clientHeight;
            const bw = maxX - minX + pad * 2;
            const bh = maxY - minY + pad * 2;
            zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, Math.min(ww / bw, wh / bh)));
            panX = (ww - (maxX + minX) * zoom) / 2;
            panY = (wh - (maxY + minY) * zoom) / 2;
            applyTransform();
        };

        // ─── TOOLS ───────────────────────────────────────────────────────────
        window.setTool = (tool) => {
            activeTool = tool;
            document.querySelectorAll('.pal-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tool-' + tool)?.classList.add('active');
            DOM.canvasWrap.className = 'tool-' + tool;
        };

        // ─── CANVAS INTERACTION ──────────────────────────────────────────────
        // Screen coords → canvas coords
        function screenToCanvas(sx, sy) {
            const rect = DOM.canvasWrap.getBoundingClientRect();
            return {
                x: ((sx - rect.left) - panX) / zoom,
                y: ((sy - rect.top)  - panY) / zoom,
            };
        }

        DOM.canvasWrap.addEventListener('mousedown', onWrapMouseDown);
        DOM.canvasWrap.addEventListener('wheel', onWheel, { passive: false });

        function onWrapMouseDown(e) {
            // Middle mouse button always pans
            if (e.button === 1) {
                e.preventDefault();
                startPan(e);
                return;
            }
            if (e.button !== 0) return;
            // If clicking directly on the wrap (not a card), deselect
            if (e.target === DOM.canvasWrap || e.target === DOM.canvas || e.target === document.getElementById('selection-box')) {
                clearSelection();
                closePropsPanel();
                if (isConnecting) finishConnecting();
            }

            if (activeTool === 'pan' || e.altKey) {
                startPan(e);
            } else if (activeTool === 'select') {
                startSelectionBox(e);
            }
            // line tool: clicking blank canvas cancels any in-progress connection
        }

        // Prevent context menu on middle click
        DOM.canvasWrap.addEventListener('auxclick', e => { if (e.button === 1) e.preventDefault(); });

        function startPan(e) {
            isPanning = true;
            panStartX = e.clientX;
            panStartY = e.clientY;
            panStartViewX = panX;
            panStartViewY = panY;
            DOM.canvasWrap.classList.add('panning');
            e.preventDefault();
        }

        function startSelectionBox(e) {
            const pos = screenToCanvas(e.clientX, e.clientY);
            isSelecting = true;
            selBoxStartX = pos.x;
            selBoxStartY = pos.y;
            const sb = document.getElementById('selection-box');
            sb.style.left = pos.x + 'px';
            sb.style.top  = pos.y + 'px';
            sb.style.width  = '0';
            sb.style.height = '0';
            sb.style.display = 'block';
            e.preventDefault();
        }

        document.addEventListener('mousemove', onDocMouseMove);
        document.addEventListener('mouseup',   onDocMouseUp);

        function onDocMouseMove(e) {
            // Handle live connector drawing + port snap highlight
            if (isConnecting && connectingFrom && tempConnLine) {
                const from = getPortPos(connectingFrom.cardId, connectingFrom.port);
                if (from) {
                    const pos = screenToCanvas(e.clientX, e.clientY);
                    // Snap: find nearest port on the hovered card
                    document.querySelectorAll('.port-snap').forEach(p => p.classList.remove('port-snap'));
                    const hovEl = document.elementFromPoint(e.clientX, e.clientY);
                    const hovCardEl = hovEl?.classList?.contains('board-card') ? hovEl : hovEl?.closest?.('.board-card');
                    let snapPos = null;
                    if (hovCardEl && hovCardEl.id !== 'card-' + connectingFrom.cardId) {
                        const hovCardId = hovCardEl.id.replace('card-', '');
                        const hovCard = cards.find(c => c.id === hovCardId);
                        if (hovCard) {
                            const w = hovCard.width  || 240;
                            const h = hovCard.height || 160;
                            const dx = pos.x - (hovCard.x + w / 2);
                            const dy = pos.y - (hovCard.y + h / 2);
                            const nearestPort = Math.abs(dx) > Math.abs(dy)
                                ? (dx > 0 ? 'right' : 'left')
                                : (dy > 0 ? 'bottom' : 'top');
                            const dotEl = hovCardEl.querySelector(`.conn-port[data-port="${nearestPort}"]`);
                            if (dotEl) dotEl.classList.add('port-snap');
                            snapPos = getPortPos(hovCardId, nearestPort);
                        }
                    }
                    // Bezier curve toward snap point or cursor
                    const target = snapPos || pos;
                    const dist = Math.max(40, Math.hypot(target.x - from.x, target.y - from.y) * 0.4);
                    const tang = { top:[0,-1], bottom:[0,1], left:[-1,0], right:[1,0] }[connectingFrom.port] || [1,0];
                    tempConnLine.setAttribute('d',
                        `M ${from.x} ${from.y} C ${from.x+tang[0]*dist} ${from.y+tang[1]*dist}, ${target.x} ${target.y-20}, ${target.x} ${target.y}`);
                }
                return;
            }
            if (isPanning) {
                panX = panStartViewX + (e.clientX - panStartX);
                panY = panStartViewY + (e.clientY - panStartY);
                applyTransform();
                return;
            }
                if (isDraggingCard) {
                    const pos = screenToCanvas(e.clientX, e.clientY);
                    const card = cards.find(c => c.id === dragCardId);
                    if (!card) return;
                    const nx = Math.round(pos.x - dragOffX);
                    const ny = Math.round(pos.y - dragOffY);
                    // Move all selected cards together
                    if (selectedCardIds.has(dragCardId) && selectedCardIds.size > 1) {
                        const dx = nx - card.x;
                        const dy = ny - card.y;
                        selectedCardIds.forEach(id => {
                            const c = cards.find(cc => cc.id === id);
                            if (!c) return;
                            c.x += dx; c.y += dy;
                            const el = document.getElementById('card-' + id);
                            if (el) { el.style.left = c.x + 'px'; el.style.top = c.y + 'px'; }
                        });
                    } else {
                        const dx = nx - card.x;
                        const dy = ny - card.y;
                        card.x = nx; card.y = ny;
                        const el = document.getElementById('card-' + dragCardId);
                        if (el) { el.style.left = nx + 'px'; el.style.top = ny + 'px'; }
                        // If dragging a column, move its children too
                        if (card.type === 'column') {
                            cards.filter(c => c.parentId === card.id).forEach(child => {
                                child.x += dx; child.y += dy;
                                const childEl = document.getElementById('card-' + child.id);
                                if (childEl) { childEl.style.left = child.x + 'px'; childEl.style.top = child.y + 'px'; }
                            });
                        }
                        // Highlight column under dragged card (if not a column itself)
                        if (card.type !== 'column') {
                            document.querySelectorAll('.card-column').forEach(colEl => {
                                const colId = colEl.id.replace('card-', '');
                                const col = cards.find(c => c.id === colId);
                                if (!col) return;
                                const inside = card.x >= col.x && card.y >= col.y &&
                                    card.x + (card.width||240) <= col.x + (col.width||320) &&
                                    card.y + (card.height||160) <= col.y + (col.height||420);
                                colEl.classList.toggle('drop-target', inside);
                            });
                        }
                    }
                    renderConnectors();
                    return;
                }
            if (isResizing) {
                const pos = screenToCanvas(e.clientX, e.clientY);
                const dw = (pos.x - resizeStartMx);
                const dh = (pos.y - resizeStartMy);
                const card = cards.find(c => c.id === resizeCardId);
                if (!card) return;
                const nw = Math.max(160, resizeStartW + dw);
                const nh = Math.max(80,  resizeStartH + dh);
                card.width  = Math.round(nw);
                card.height = Math.round(nh);
                const el = document.getElementById('card-' + resizeCardId);
                if (el) { el.style.width = nw + 'px'; el.style.minHeight = nh + 'px'; }
                return;
            }
            if (isSelecting) {
                const pos = screenToCanvas(e.clientX, e.clientY);
                const x = Math.min(pos.x, selBoxStartX);
                const y = Math.min(pos.y, selBoxStartY);
                const w = Math.abs(pos.x - selBoxStartX);
                const h = Math.abs(pos.y - selBoxStartY);
                const sb = document.getElementById('selection-box');
                sb.style.left   = x + 'px';
                sb.style.top    = y + 'px';
                sb.style.width  = w + 'px';
                sb.style.height = h + 'px';
                // Highlight cards inside box
                cards.forEach(c => {
                    const inside = c.x < x + w && c.x + (c.width||240) > x &&
                                   c.y < y + h && c.y + (c.height||160) > y;
                    const el = document.getElementById('card-' + c.id);
                    if (el) el.classList.toggle('selected', inside);
                    if (inside) selectedCardIds.add(c.id);
                    else selectedCardIds.delete(c.id);
                });
            }
        }

        function onDocMouseUp(e) {
            DOM.canvasWrap.classList.remove('panning');

            if (isConnecting) {
                const elAt = document.elementFromPoint(e.clientX, e.clientY);
                const portEl = elAt?.classList?.contains('conn-port') ? elAt : elAt?.closest?.('.conn-port');
                const cardEl = elAt?.classList?.contains('board-card') ? elAt : elAt?.closest?.('.board-card');

                let toCardId = null, toPort = null;

                if (portEl) {
                    // Released directly on a port dot
                    const toCardEl = portEl.closest('.board-card');
                    toCardId = toCardEl?.id?.replace('card-', '');
                    toPort   = portEl.dataset.port;
                } else if (cardEl) {
                    // Released anywhere on a card — snap to the nearest port automatically
                    toCardId = cardEl.id.replace('card-', '');
                    const pos = screenToCanvas(e.clientX, e.clientY);
                    const toCard = cards.find(c => c.id === toCardId);
                    if (toCard) {
                        const w = toCard.width  || 240;
                        const h = toCard.height || 160;
                        const dx = pos.x - (toCard.x + w / 2);
                        const dy = pos.y - (toCard.y + h / 2);
                        toPort = Math.abs(dx) > Math.abs(dy)
                            ? (dx > 0 ? 'right' : 'left')
                            : (dy > 0 ? 'bottom' : 'top');
                    }
                }

                if (toCardId && toPort) {
                    const { cardId: fromCardId, port: fromPort } = connectingFrom;
                    if (fromCardId !== toCardId) {
                        const connId = 'conn_' + Date.now();
                        const conn = { id: connId, fromId: fromCardId, fromPort, toId: toCardId, toPort, style: 'solid', color: '#a0a0a0' };
                        connections.push(conn);
                        saveConnection(conn);
                        renderConnectors();
                    }
                }
                // Clear snap highlights
                document.querySelectorAll('.port-snap').forEach(p => p.classList.remove('port-snap'));
                finishConnecting();
                return;
            }
            if (isDraggingCard) {
                isDraggingCard = false;
                const el = document.getElementById('card-' + dragCardId);
                el?.classList.remove('dragging');
                // Persist positions of all moved cards
                if (selectedCardIds.has(dragCardId) && selectedCardIds.size > 1) {
                    selectedCardIds.forEach(id => { const c = cards.find(cc => cc.id === id); if (c) saveCard(c); });
                } else {
                    const card = cards.find(c => c.id === dragCardId);
                    if (card) {
                        // Check if card was dropped inside a column (assign parentId)
                        if (card.type !== 'column') {
                            const col = cards.find(c => c.type === 'column' &&
                                card.x >= c.x && card.y >= c.y &&
                                card.x + (card.width||240) <= c.x + (c.width||320) &&
                                card.y + (card.height||160) <= c.y + (c.height||420));
                            if (col) {
                                card.parentId = col.id;
                            } else if (card.parentId) {
                                const prevParent = cards.find(c => c.id === card.parentId);
                                if (!prevParent) card.parentId = null;
                                else {
                                    // Check still inside parent
                                    const p = prevParent;
                                    const inside = card.x >= p.x && card.y >= p.y &&
                                        card.x + (card.width||240) <= p.x + (p.width||320) &&
                                        card.y + (card.height||160) <= p.y + (p.height||420);
                                    if (!inside) card.parentId = null;
                                }
                            }
                        }
                        // Clear all column drop-target highlights
                        document.querySelectorAll('.card-column.drop-target').forEach(c => c.classList.remove('drop-target'));
                        saveCard(card);
                    }
                }
                renderConnectors();
                dragCardId = null;
            }
            if (isResizing) {
                isResizing = false;
                const card = cards.find(c => c.id === resizeCardId);
                if (card) saveCard(card);
                resizeCardId = null;
            }
            if (isPanning) isPanning = false;
            if (isSelecting) {
                isSelecting = false;
                document.getElementById('selection-box').style.display = 'none';
            }
        }

        function onWheel(e) {
            e.preventDefault();
            if (e.ctrlKey || e.metaKey) {
                // Zoom toward mouse position
                const rect = DOM.canvasWrap.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const delta = e.deltaY > 0 ? -0.08 : 0.08;
                const newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom + delta));
                panX = mx - (mx - panX) * (newZoom / zoom);
                panY = my - (my - panY) * (newZoom / zoom);
                zoom = newZoom;
                applyTransform();
            } else {
                panX -= e.deltaX;
                panY -= e.deltaY;
                applyTransform();
            }
        }

        function clearSelection() {
            selectedCardIds.clear();
            document.querySelectorAll('.board-card.selected').forEach(el => el.classList.remove('selected'));
            selectedConnId = null;
            document.querySelectorAll('.connector-path.selected').forEach(p => p.classList.remove('selected'));
        }

        // ─── PROPERTIES PANEL ────────────────────────────────────────────────

            wireNum('prop-w','width',80); wireNum('prop-h','height',40);

            // Line colour

                lineColorInp.addEventListener('input', () => {

        window.closePropsPanel = () => {

        // ─── CONNECTOR FUNCTIONS ─────────────────────────────────────────────

        function getPortPos(cardId, port) {
            const card = cards.find(c => c.id === cardId);
            if (!card) return null;
            const w = card.width || 240;
            const h = card.height || 160;
            return {
                top:    { x: card.x + w / 2, y: card.y },
                bottom: { x: card.x + w / 2, y: card.y + h },
                left:   { x: card.x,         y: card.y + h / 2 },
                right:  { x: card.x + w,     y: card.y + h / 2 },
            }[port] || { x: card.x + w / 2, y: card.y + h / 2 };
        }

        function connectorPath(fx, fy, fromPort, tx, ty, toPort) {
            const dist = Math.max(60, Math.hypot(tx - fx, ty - fy) * 0.4);
            const tangents = { top:[0,-1], bottom:[0,1], left:[-1,0], right:[1,0] };
            const [ftx, fty] = tangents[fromPort] || [1, 0];
            const toDir = tangents[toPort];
            let ttx, tty;
            if (toDir) {
                [ttx, tty] = toDir;
            } else {
                // Auto-tangent: point back toward from
                const dx = fx - tx, dy = fy - ty;
                const len = Math.hypot(dx, dy) || 1;
                ttx = dx / len; tty = dy / len;
            }
            return `M ${fx} ${fy} C ${fx + ftx*dist} ${fy + fty*dist}, ${tx + ttx*dist} ${ty + tty*dist}, ${tx} ${ty}`;
        }

        function renderConnectors() {
            const group = document.getElementById('connector-group');
            if (!group) return;
            let g = group.querySelector('#saved-connectors');
            if (!g) {
                g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.id = 'saved-connectors';
                group.prepend(g);
            }
            g.innerHTML = '';
            connections.forEach(conn => renderConnector(conn, g));
        }

        function renderConnector(conn, container) {
            const from = getPortPos(conn.fromId, conn.fromPort);
            const to   = getPortPos(conn.toId,   conn.toPort);
            if (!from || !to) return;

            const d = connectorPath(from.x, from.y, conn.fromPort, to.x, to.y, conn.toPort);
            const dashArr = conn.style === 'dashed' ? '8,5' : conn.style === 'dotted' ? '2,5' : 'none';
            const color   = conn.color || '#a0a0a0';
            const defId   = 'arr-' + conn.id;

            // Arrowhead marker
            const defs   = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            marker.setAttribute('id', defId);
            marker.setAttribute('markerWidth', '8'); marker.setAttribute('markerHeight', '8');
            marker.setAttribute('refX', '6');        marker.setAttribute('refY', '4');
            marker.setAttribute('orient', 'auto');
            const arrowPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            arrowPath.setAttribute('d', 'M0,1 L6,4 L0,7');
            arrowPath.setAttribute('fill', 'none');
            arrowPath.setAttribute('stroke', color);
            arrowPath.setAttribute('stroke-width', '1.5');
            arrowPath.setAttribute('stroke-linejoin', 'round');
            marker.appendChild(arrowPath);
            defs.appendChild(marker);
            container.appendChild(defs);

            // Invisible fat hitbox for easy clicking
            const hitbox = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            hitbox.setAttribute('d', d);
            hitbox.setAttribute('fill', 'none');
            hitbox.setAttribute('stroke', 'transparent');
            hitbox.setAttribute('stroke-width', '14');
            hitbox.setAttribute('pointer-events', 'stroke');
            hitbox.classList.add('conn-hitbox');
            hitbox.style.cursor = 'pointer';
            container.appendChild(hitbox);

            // Visible path
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', d);
            path.setAttribute('stroke', color);
            path.setAttribute('stroke-width', '2');
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke-dasharray', dashArr);
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('marker-end', `url(#${defId})`);
            path.classList.add('connector-path');
            path.dataset.connId = conn.id;
            if (conn.id === selectedConnId) path.classList.add('selected');
            container.appendChild(path);

            // Click selects connector
            hitbox.addEventListener('mousedown', e => {
                if (activeTool !== 'select') return;
                e.stopPropagation();
                e.preventDefault();
                clearSelection();
                if (selectedConnId === conn.id) {
                    selectedConnId = null;
                    closePropsPanel();
                    path.classList.remove('selected');
                } else {
                    selectedConnId = conn.id;
                    path.classList.add('selected');
                    openConnPropsPanel(conn.id);
                }
            });
        }

        function openConnPropsPanel(connId) {
            const conn = connections.find(c => c.id === connId);
            if (!conn) return;
            const panel = document.getElementById('props-panel');
            const body  = document.getElementById('props-body');
            document.getElementById('props-type-label').textContent = 'Connector';
            body.innerHTML = `
                <div class="prop-row">
                    <div class="prop-label">Style</div>
                    <div style="display:flex;gap:5px;">
                        <button class="line-style-btn${(conn.style||'solid')==='solid'?' active':''}" data-cs="solid">—</button>
                        <button class="line-style-btn${conn.style==='dashed'?' active':''}" data-cs="dashed">- -</button>
                        <button class="line-style-btn${conn.style==='dotted'?' active':''}" data-cs="dotted">···</button>
                    </div>
                </div>
                <div class="prop-row">
                    <div class="prop-label">Colour</div>
                    <input class="prop-input" type="color" id="prop-conn-color" value="${conn.color||'#a0a0a0'}" style="padding:2px 4px;height:32px;">
                </div>
                <button class="prop-del-btn" id="prop-del-conn">Delete connector</button>`;
            panel.classList.add('open');

            body.querySelectorAll('[data-cs]').forEach(btn => {
                btn.addEventListener('click', () => {

                    body.querySelectorAll('[data-cs]').forEach(b => b.classList.toggle('active', b.dataset.cs === conn.style));
                    renderConnectors();
                    saveConnection(conn);
                });
            });
            document.getElementById('prop-conn-color')?.addEventListener('input', e => {
