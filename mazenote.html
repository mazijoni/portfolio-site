        function finishConnecting() {
            isConnecting = false;
            connectingFrom = null;
            if (tempConnLine) { tempConnLine.remove(); tempConnLine = null; }
        }

        async function saveConnection(conn) {
            if (!currentUser || !activeBoardId) return;
            try {
                await _sd(
                    _doc(db, 'users', currentUser.uid, 'boards', activeBoardId, 'connections', conn.id),
                    { fromId: conn.fromId, fromPort: conn.fromPort, toId: conn.toId, toPort: conn.toPort,
                      style: conn.style || 'solid', color: conn.color || '#a0a0a0', updatedAt: _st() }
                );
            } catch (err) { console.error('saveConnection error:', err); }
        }

        async function deleteConnection(connId) {
            connections = connections.filter(c => c.id !== connId);
            if (selectedConnId === connId) selectedConnId = null;
            renderConnectors();
            if (!currentUser || !activeBoardId) return;
            try {
                await _dd(_doc(db, 'users', currentUser.uid, 'boards', activeBoardId, 'connections', connId));
            } catch (err) { console.error('deleteConnection error:', err); }
        }

        // ─── ADD CARD ─────────────────────────────────────────────────────────
        window.addCard = (type) => {
            if (!activeBoardId) return;
            // Place new card near center of viewport
            const rect = DOM.canvasWrap.getBoundingClientRect();
            const cx = (rect.width / 2 - panX) / zoom;
            const cy = (rect.height / 2 - panY) / zoom;
            pendingCardPos = { x: Math.round(cx - 120), y: Math.round(cy - 80) };

            const mkCard = (extra) => {
                const id = 'card_' + Date.now();
                const data = { x: pendingCardPos.x, y: pendingCardPos.y, width: 240, height: 160, ...extra, id };
                cards.push(data);
                renderCard(data);
                saveCard(data);
                setTool('select');
            };

            if (type === 'note') {
                mkCard({ type: 'note', width: 240, height: 160, text: '', color: 'default' });
            } else if (type === 'link') {
                document.getElementById('link-url-input').value = '';
                document.getElementById('link-title-input').value = '';
                openModal('modal-add-link');
                setTimeout(() => document.getElementById('link-url-input').focus(), 50);
                setTool('select');
            } else if (type === 'image') {
                document.getElementById('image-url-input').value = '';
                document.getElementById('image-file-input').value = '';
                openModal('modal-add-image');
                setTool('select');
            } else if (type === 'todo') {
                mkCard({ type: 'todo', width: 240, height: 200, title: 'To-Do', items: [] });
            } else if (type === 'column') {
                mkCard({ type: 'column', width: 320, height: 420, title: 'Group' });
            } else if (type === 'comment') {
                mkCard({ type: 'comment', width: 220, height: 120, text: '', author: '' });
            } else if (type === 'table') {
                mkCard({ type: 'table', width: 300, height: 160, rows: [['','',''],['','',''],['','',' ']], headers: ['Col 1','Col 2','Col 3'] });
            } else if (type === 'draw') {
                mkCard({ type: 'draw', width: 260, height: 200, strokes: '' });
            }
        };

        window.confirmAddLink = () => {
            let url = document.getElementById('link-url-input').value.trim();
            let title = document.getElementById('link-title-input').value.trim();
            if (!url) return;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            if (!title) {
                try { title = new URL(url).hostname.replace('www.', ''); } catch { title = url; }
            }
            const id = 'card_' + Date.now();
            const favicon = 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(url) + '&sz=32';
            const data = { id, type: 'link', x: pendingCardPos.x, y: pendingCardPos.y, width: 260, height: 100, url, title, favicon };
            cards.push(data);
            renderCard(data);
            saveCard(data);
            closeModal('modal-add-link');
        };

        window.confirmAddImage = () => {
            const urlVal = document.getElementById('image-url-input').value.trim();
            const fileInput = document.getElementById('image-file-input');

            const doAdd = (src) => {
                const id = 'card_' + Date.now();
                const data = { id, type: 'image', x: pendingCardPos.x, y: pendingCardPos.y, width: 280, height: 220, src, caption: '' };
                cards.push(data);
                renderCard(data);
                saveCard(data);
                closeModal('modal-add-image');
            };

            if (fileInput.files && fileInput.files[0]) {
                compressImage(fileInput.files[0], 1200, 0.82).then(doAdd);
            } else if (urlVal) {
                doAdd(urlVal);
            }
        };

        // Resizes an image File to maxDim px on the longest side and returns a compressed JPEG data URL.
        function compressImage(file, maxDim, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width, h = img.height;
                        if (w > maxDim || h > maxDim) {
                            if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
                            else        { w = Math.round(w * maxDim / h); h = maxDim; }
                        }
                        const cvs = document.createElement('canvas');
                        cvs.width = w; cvs.height = h;
                        cvs.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(cvs.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // ─── RENDER CARD ─────────────────────────────────────────────────────
        function renderCard(data) {
            const existing = document.getElementById('card-' + data.id);
            if (existing) existing.remove();

            const el = document.createElement('div');
            el.id = 'card-' + data.id;
            el.className = 'board-card card-' + data.type;
            el.style.left  = data.x + 'px';
            el.style.top   = data.y + 'px';
            el.style.width = (data.width || 240) + 'px';
            if (data.height) el.style.minHeight = data.height + 'px';
            if (data.color && data.color !== 'default') el.dataset.color = data.color;

            el.innerHTML = cardHTML(data);
            attachCardEvents(el, data);

            // Columns go behind all other cards
            if (data.type === 'column') {
                const firstNonCol = DOM.canvas.querySelector('.board-card:not(.card-column)');
                if (firstNonCol) DOM.canvas.insertBefore(el, firstNonCol);
                else DOM.canvas.appendChild(el);
            } else {
                DOM.canvas.appendChild(el);
            }
        }

        function syncCardDOM(data) {
            // Only sync non-interactive fields to avoid fighting with user typing
            const el = document.getElementById('card-' + data.id);
            if (!el) { renderCard(data); return; }
            // Update position if it changed from another source (don't disrupt local drag)
            if (!isDraggingCard || dragCardId !== data.id) {
                el.style.left = data.x + 'px';
                el.style.top  = data.y + 'px';
            }
        }

        function cardHTML(data) {
            const type = data.type;
            let inner = '';

            if (type === 'note') {
                inner = `
                    <div class="card-body" style="padding:0.6rem 0.7rem 0.5rem;">
                        <textarea class="note-textarea" placeholder="Type a note…" rows="4">${escHtml(data.text || '')}</textarea>
                    </div>`;
            } else if (type === 'link') {
                inner = `
                    <div class="card-body">
                        <a class="link-preview" href="${sanitizeUrl(data.url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
                            <img class="link-favicon" src="${sanitizeUrl(data.favicon||'')}" alt="" onerror="this.style.display='none'">
                            <div class="link-info">
                                <div class="link-title">${escHtml(data.title || data.url)}</div>
                                <div class="link-url">${escHtml(data.url)}</div>
                            </div>
                        </a>
                        <a class="link-open-btn" href="${sanitizeUrl(data.url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
                            Open ↗
                        </a>
                    </div>`;
            } else if (type === 'image') {
                const imgSrc = data.src ? sanitizeUrl(data.src) : null;
                inner = `
                    <div class="card-body" style="padding:0;">
                        <div class="img-wrap">
                            ${imgSrc
                                ? `<img src="${imgSrc}" alt="${escHtml(data.caption||'')}" draggable="false">`
                                : `<div class="img-placeholder">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
                                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                                            <circle cx="8.5" cy="8.5" r="1.5"/>
                                            <polyline points="21 15 16 10 5 21"/>
                                        </svg>
                                        <span>No image</span>
                                    </div>`
                            }
                        </div>
                        <div style="padding:0.4rem 0.6rem 0.5rem;">
                            <textarea class="img-caption" rows="1" placeholder="Caption…">${escHtml(data.caption||'')}</textarea>
                        </div>
                    </div>`;
            } else if (type === 'todo') {
                const items = data.items || [];
                inner = `
                    <div class="card-body">
                        <div class="todo-list">
                            ${items.map((item, i) => `
                                <div class="todo-item${item.done?' done':''}" data-idx="${i}">
                                    <input type="checkbox" class="todo-check" ${item.done?'checked':''}>
                                    <input type="text" class="todo-text" value="${escHtml(item.text||'')}" placeholder="Task…">
                                    <button class="todo-del-btn" data-idx="${i}">✕</button>
                                </div>`).join('')}
                        </div>
                        <div class="todo-add-row">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            <span>Add item</span>
                        </div>
                    </div>`;
            } else if (type === 'column') {
                inner = `<div class="column-hint">Drag cards here to group them</div>`;
            } else if (type === 'comment') {
                inner = `
                    <div class="card-body">
                        <div class="comment-author">${escHtml(data.author||'')}</div>
                        <textarea class="comment-textarea" placeholder="Leave a comment…">${escHtml(data.text||'')}</textarea>
                    </div>
                    <div class="comment-tail"></div>
                    <div class="comment-tail-inner"></div>`;
            } else if (type === 'table') {
                const headers = data.headers || ['Col 1','Col 2','Col 3'];
                const rows = data.rows || [[' ',' ',' '],[' ',' ',' ']];
                inner = `
                    <div class="table-wrap">
                        <table>
                            <thead><tr>${headers.map((h,ci) => `<td><input value="${escHtml(h)}" data-row="-1" data-col="${ci}"></td>`).join('')}</tr></thead>
                            <tbody>${rows.map((row,ri) =>
                                `<tr>${row.map((cell,ci) => `<td><input value="${escHtml(cell)}" data-row="${ri}" data-col="${ci}"></td>`).join('')}</tr>`
                            ).join('')}</tbody>
                        </table>
                    </div>
                    <div class="table-controls">
                        <button class="table-add-col">+ Col</button>
                        <button class="table-add-row-btn">+ Row</button>
                    </div>`;
            } else if (type === 'draw') {
                inner = `
                    <canvas class="draw-canvas" width="260" height="180"></canvas>
                    <div class="draw-toolbar">
                        <div class="draw-color-swatch" style="background:#ffffff" data-draw-color="#ffffff"></div>
                        <div class="draw-color-swatch" style="background:var(--accent-purple)" data-draw-color="#c772fe"></div>
                        <div class="draw-color-swatch" style="background:#55cc88" data-draw-color="#55cc88"></div>
                        <div class="draw-color-swatch" style="background:#ff5555" data-draw-color="#ff5555"></div>
                        <input type="range" class="draw-size-slider" min="1" max="16" value="3">
                        <button class="draw-clear-btn">Clear</button>
                    </div>`;
            }

            const titleLabel = { note:'Note', link:'Link', image:'Image', todo:'To-Do', column:'Column', comment:'Comment', table:'Table', draw:'Draw' }[type] || type;
            return `
                <div class="card-handle">
                    <span class="card-handle-icon">${cardIconSVG(type)}</span>
                    <span class="card-handle-title">${type === 'todo' || type === 'column' ? escHtml(data.title || titleLabel) : titleLabel}</span>
                    <button class="card-action-btn" data-delete="1" title="Delete card">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                ${inner}
                <div class="card-resize"></div>
                <div class="conn-port" data-port="top"></div>
                <div class="conn-port" data-port="bottom"></div>
                <div class="conn-port" data-port="left"></div>
                <div class="conn-port" data-port="right"></div>`;
        }

        function cardIconSVG(type) {
            const icons = {
                note:    `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/></svg>`,
                link:    `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
                image:   `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
                todo:    `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
                line:    `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="15 5 19 5 19 9"/></svg>`,
                column:  `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>`,
                comment: `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
                table:   `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="12" y1="3" x2="12" y2="21"/></svg>`,
                draw:    `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>`,
            };
            return icons[type] || `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16"/></svg>`;
        }

        function attachCardEvents(el, data) {
            // Delete button
            el.querySelector('[data-delete]')?.addEventListener('click', (e) => {
                e.stopPropagation();
                removeCard(data.id);
            });

            // Drag (from handle only)
            const handle = el.querySelector('.card-handle');
            handle.addEventListener('mousedown', (e) => {
                if (activeTool === 'line') return; // Don't drag in connect mode
                if (e.target.closest('[data-delete]')) return;
                e.preventDefault();
                e.stopPropagation();
                if (!selectedCardIds.has(data.id)) {
                    if (!e.shiftKey) clearSelection();
                    selectedCardIds.add(data.id);
                    el.classList.add('selected');
                }
                // Always read current position from the live cards array — the closure
                // variable `data` can be stale if the card was dragged before.
                const current = cards.find(c => c.id === data.id) || data;
                const pos = screenToCanvas(e.clientX, e.clientY);
                dragOffX = pos.x - current.x;
                dragOffY = pos.y - current.y;
                dragCardId = data.id;
                isDraggingCard = true;
                el.classList.add('dragging');
            });

            // Click on card to select (and open props on single select)
            el.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                if (activeTool === 'line') {
                    // Start a connection from the nearest port on this card
                    e.preventDefault();
                    const pos = screenToCanvas(e.clientX, e.clientY);
                    const current = cards.find(c => c.id === data.id) || data;
                    const w = current.width  || 240;
                    const h = current.height || 160;
                    const dx = pos.x - (current.x + w / 2);
                    const dy = pos.y - (current.y + h / 2);
                    const fromPort = Math.abs(dx) > Math.abs(dy)
                        ? (dx > 0 ? 'right' : 'left')
                        : (dy > 0 ? 'bottom' : 'top');
                    isConnecting = true;
                    connectingFrom = { cardId: data.id, port: fromPort };
                    const connGroup = document.getElementById('connector-group');
                    if (!connGroup) return;
                    tempConnLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    tempConnLine.setAttribute('stroke', '#c772fe');
                    tempConnLine.setAttribute('stroke-width', '2');
                    tempConnLine.setAttribute('fill', 'none');
                    tempConnLine.setAttribute('stroke-dasharray', '5,3');
                    tempConnLine.setAttribute('stroke-linecap', 'round');
                    tempConnLine.style.pointerEvents = 'none';
                    connGroup.appendChild(tempConnLine);
                    return;
                }
                if (!e.shiftKey) {
                    clearSelection();
                    selectedCardIds.add(data.id);
                    el.classList.add('selected');
                    openPropsPanel(data.id);
                } else {
                    selectedCardIds.add(data.id);
                    el.classList.add('selected');
                    closePropsPanel();
                }
            });

            // Connection port mousedown starts a connection
            el.querySelectorAll('.conn-port').forEach(dot => {
                dot.addEventListener('mousedown', e => {
                    if (activeTool !== 'line') return;
                    e.stopPropagation(); e.preventDefault();
                    isConnecting = true;
                    connectingFrom = { cardId: data.id, port: dot.dataset.port };
                    const connGroup = document.getElementById('connector-group');
                    if (!connGroup) return;
                    tempConnLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    tempConnLine.setAttribute('stroke', '#c772fe');
                    tempConnLine.setAttribute('stroke-width', '2');
                    tempConnLine.setAttribute('fill', 'none');
                    tempConnLine.setAttribute('stroke-dasharray', '5,3');
                    tempConnLine.setAttribute('stroke-linecap', 'round');
                    tempConnLine.style.pointerEvents = 'none';
                    connGroup.appendChild(tempConnLine);
                });
            });

            // Resize
            el.querySelector('.card-resize')?.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const pos = screenToCanvas(e.clientX, e.clientY);
                resizeCardId = data.id;
                resizeStartW = data.width || 240;
                resizeStartH = data.height || 160;
                resizeStartMx = pos.x;
                resizeStartMy = pos.y;
                isResizing = true;
            });

            // Note-specific
            if (data.type === 'note') {
                const ta = el.querySelector('.note-textarea');
                if (ta) {
                    ta.addEventListener('input', () => {
                        data.text = ta.value;
                        autoResizeTA(ta);
                        debounceSave(data);
                    });
                    ta.addEventListener('mousedown', e => e.stopPropagation());
                    autoResizeTA(ta);
                }
            }

            // Link-specific (prevent drag from link clicks)
            if (data.type === 'link') {
                el.querySelectorAll('a').forEach(a => a.addEventListener('mousedown', e => e.stopPropagation()));
            }

            // Image caption
            if (data.type === 'image') {
                const cap = el.querySelector('.img-caption');
                if (cap) {
                    cap.addEventListener('input', () => { data.caption = cap.value; debounceSave(data); });
                    cap.addEventListener('mousedown', e => e.stopPropagation());
                }
            }

            // Todo
            if (data.type === 'todo') {
                bindTodoEvents(el, data);
            }

            // Column
            if (data.type === 'column') {
                // Column title editable from handle
                const titleEl = el.querySelector('.card-handle-title');
                if (titleEl) {
                    titleEl.setAttribute('contenteditable', 'true');
                    titleEl.setAttribute('spellcheck', 'false');
                    titleEl.addEventListener('mousedown', e => e.stopPropagation());
                    titleEl.addEventListener('input', () => { data.title = titleEl.textContent.trim(); debounceSave(data); });
                    titleEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });
                }
            }

            // Comment
            if (data.type === 'comment') {
                const ta = el.querySelector('.comment-textarea');
                if (ta) {
                    ta.addEventListener('input', () => { data.text = ta.value; autoResizeTA(ta); debounceSave(data); });
                    ta.addEventListener('mousedown', e => e.stopPropagation());
                    autoResizeTA(ta);
                }
            }

            // Table
            if (data.type === 'table') {
                bindTableEvents(el, data);
            }

            // Draw
            if (data.type === 'draw') {
                bindDrawEvents(el, data);
            }
        }

        function bindTodoEvents(el, data) {
            const listEl = el.querySelector('.todo-list');

            const rebuildList = () => {
                // Re-render just the todo list contents
                listEl.innerHTML = (data.items||[]).map((item, i) => `
                    <div class="todo-item${item.done?' done':''}" data-idx="${i}">
                        <input type="checkbox" class="todo-check" ${item.done?'checked':''}>
                        <input type="text" class="todo-text" value="${escHtml(item.text||'')}" placeholder="Task…">
                        <button class="todo-del-btn" data-idx="${i}">✕</button>
                    </div>`).join('');
                attachTodoItemEvents();
            };

            const attachTodoItemEvents = () => {
                listEl.querySelectorAll('.todo-check').forEach((cb, i) => {
                    cb.addEventListener('change', () => {
                        data.items[i].done = cb.checked;
                        cb.closest('.todo-item').classList.toggle('done', cb.checked);
                        debounceSave(data);
                    });
                    cb.addEventListener('mousedown', e => e.stopPropagation());
                });
                listEl.querySelectorAll('.todo-text').forEach((inp, i) => {
                    inp.addEventListener('input', () => {
                        data.items[i].text = inp.value;
                        debounceSave(data);
                    });
                    inp.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            data.items.splice(i + 1, 0, { text: '', done: false });
                            debounceSave(data);
                            rebuildList();
                            // Focus next
                            const inputs = listEl.querySelectorAll('.todo-text');
                            inputs[i + 1]?.focus();
                        }
                        if (e.key === 'Backspace' && inp.value === '' && data.items.length > 1) {
                            e.preventDefault();
                            data.items.splice(i, 1);
                            debounceSave(data);
                            rebuildList();
                            const inputs = listEl.querySelectorAll('.todo-text');
                            inputs[Math.max(0, i - 1)]?.focus();
                        }
                    });
                    inp.addEventListener('mousedown', e => e.stopPropagation());
                });
                listEl.querySelectorAll('.todo-del-btn').forEach((btn, i) => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        data.items.splice(i, 1);
                        debounceSave(data);
                        rebuildList();
                    });
                });
            };

            attachTodoItemEvents();

            el.querySelector('.todo-add-row')?.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!data.items) data.items = [];
                data.items.push({ text: '', done: false });
                debounceSave(data);
                rebuildList();
                setTimeout(() => {
                    const inputs = listEl.querySelectorAll('.todo-text');
                    inputs[inputs.length - 1]?.focus();
                }, 30);
            });

            el.querySelector('.todo-add-row')?.addEventListener('mousedown', e => e.stopPropagation());

            // Allow header title to be edited
            const titleEl = el.querySelector('.card-handle-title');
            if (titleEl) {
                titleEl.setAttribute('contenteditable', 'true');
                titleEl.setAttribute('spellcheck', 'false');
                titleEl.addEventListener('mousedown', e => e.stopPropagation());
                titleEl.addEventListener('input', () => {
                    data.title = titleEl.textContent.trim();
                    debounceSave(data);
                });
                titleEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });
            }
        }

        function bindTableEvents(el, data) {
            const syncFromDOM = () => {
                const tbl = el.querySelector('table');
                if (!tbl) return;
                data.headers = [...tbl.querySelectorAll('thead input')].map(i => i.value);
                data.rows = [...tbl.querySelectorAll('tbody tr')].map(tr =>
                    [...tr.querySelectorAll('input')].map(i => i.value)
                );
                debounceSave(data);
            };
            el.querySelectorAll('table input').forEach(inp => {
                inp.addEventListener('input', syncFromDOM);
                inp.addEventListener('mousedown', e => e.stopPropagation());
            });
            el.querySelector('.table-add-row-btn')?.addEventListener('click', e => {
                e.stopPropagation();
                const cols = (data.headers||[]).length || 3;
                if (!data.rows) data.rows = [];
                data.rows.push(new Array(cols).fill(''));
                debounceSave(data);
                // re-render table body
                const tbody = el.querySelector('tbody');
                if (tbody) {
                    const ri = data.rows.length - 1;
                    const tr = document.createElement('tr');
                    tr.innerHTML = data.rows[ri].map((cell,ci) => `<td><input value="${escHtml(cell)}" data-row="${ri}" data-col="${ci}"></td>`).join('');
                    tbody.appendChild(tr);
                    tr.querySelectorAll('input').forEach(inp => { inp.addEventListener('input', syncFromDOM); inp.addEventListener('mousedown', e => e.stopPropagation()); });
                }
            });
            el.querySelector('.table-add-col')?.addEventListener('click', e => {
                e.stopPropagation();
                if (!data.headers) data.headers = [];
                data.headers.push('Col ' + (data.headers.length + 1));
                data.rows = (data.rows||[]).map(r => [...r, '']);
                debounceSave(data);
                // Re-render whole table
                const tblWrap = el.querySelector('.table-wrap');
                if (tblWrap) {
                    tblWrap.innerHTML = `<table><thead><tr>${data.headers.map((h,ci)=>`<td><input value="${escHtml(h)}" data-row="-1" data-col="${ci}"></td>`).join('')}</tr></thead><tbody>${(data.rows||[]).map((row,ri)=>`<tr>${row.map((cell,ci)=>`<td><input value="${escHtml(cell)}" data-row="${ri}" data-col="${ci}"></td>`).join('')}</tr>`).join('')}</tbody></table>`;
                    tblWrap.querySelectorAll('input').forEach(inp => { inp.addEventListener('input', syncFromDOM); inp.addEventListener('mousedown', e => e.stopPropagation()); });
                }
            });
            el.querySelector('.table-add-row-btn')?.addEventListener('mousedown', e => e.stopPropagation());
            el.querySelector('.table-add-col')?.addEventListener('mousedown', e => e.stopPropagation());
        }

        function bindDrawEvents(el, data) {
            const canvas = el.querySelector('.draw-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let drawing = false;
            let drawColor = '#ffffff';
            let drawSize = 3;

            // Restore existing strokes
            if (data.strokes) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = data.strokes;
            }

            canvas.addEventListener('mousedown', e => {
                e.stopPropagation(); e.preventDefault();
                drawing = true;
                ctx.beginPath();
                const r = canvas.getBoundingClientRect();
                ctx.moveTo((e.clientX - r.left) / (r.width / canvas.width), (e.clientY - r.top) / (r.height / canvas.height));
            });
            canvas.addEventListener('mousemove', e => {
                if (!drawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo((e.clientX - r.left) / (r.width / canvas.width), (e.clientY - r.top) / (r.height / canvas.height));
                ctx.strokeStyle = drawColor;
                ctx.lineWidth = drawSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            });
            const stopDraw = () => {
                if (!drawing) return;
                drawing = false;
                data.strokes = canvas.toDataURL();
                debounceSave(data);
            };
            canvas.addEventListener('mouseup', stopDraw);
            canvas.addEventListener('mouseleave', stopDraw);

            el.querySelectorAll('[data-draw-color]').forEach(swatch => {
                swatch.addEventListener('click', e => { e.stopPropagation(); drawColor = swatch.dataset.drawColor; });
                swatch.addEventListener('mousedown', e => e.stopPropagation());
            });
            el.querySelector('.draw-size-slider')?.addEventListener('input', e => { drawSize = +e.target.value; });
            el.querySelector('.draw-size-slider')?.addEventListener('mousedown', e => e.stopPropagation());
            el.querySelector('.draw-clear-btn')?.addEventListener('click', e => {
                e.stopPropagation();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                data.strokes = '';
                debounceSave(data);
            });
            el.querySelector('.draw-clear-btn')?.addEventListener('mousedown', e => e.stopPropagation());
        }

        function autoResizeTA(ta) {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
        }

        // ─── DELETE CARD ──────────────────────────────────────────────────────
        function removeCard(cardId) {
            // Remove any connectors attached to this card
            const connIds = connections.filter(c => c.fromId === cardId || c.toId === cardId).map(c => c.id);
            connIds.forEach(id => deleteConnection(id));

            // If removing a column, unparent its children (don't delete them)
            if (cards.find(c => c.id === cardId)?.type === 'column') {
                cards.filter(c => c.parentId === cardId).forEach(child => {
                    child.parentId = null;
                    saveCard(child);
                });
            }

            const el = document.getElementById('card-' + cardId);
            el?.remove();
            cards = cards.filter(c => c.id !== cardId);
            selectedCardIds.delete(cardId);
            if (currentUser && activeBoardId) {
                _dd(_doc(db, 'users', currentUser.uid, 'boards', activeBoardId, 'cards', cardId))
                    .catch(err => console.error('Delete card error:', err));
            }
        }

        window.deleteSelected = () => {
            if (selectedConnId) {
                deleteConnection(selectedConnId);
                closePropsPanel();
                return;
            }
            [...selectedCardIds].forEach(id => removeCard(id));
            clearSelection();
        };

        // ─── SAVE ─────────────────────────────────────────────────────────────
        function debounceSave(data) {
            if (saveTimer) clearTimeout(saveTimer);
            showSaveIndicator();
            saveTimer = setTimeout(() => {
                saveCard(data).then(() => hideSaveIndicator());
            }, 800);
        }

        async function saveCard(data) {
            if (!currentUser || !activeBoardId) return;
            // Clean the data for Firestore (no undefined values)
            const payload = cleanPayload(data);
            try {
                await _sd(
                    _doc(db, 'users', currentUser.uid, 'boards', activeBoardId, 'cards', data.id),
                    { ...payload, updatedAt: _st() }
                );
            } catch (err) {
                console.error('saveCard error:', err);
                showToast('Save failed', 'error');
            }
        }

        function cleanPayload(obj) {
            // Recursively remove undefined values
            return JSON.parse(JSON.stringify(obj));
        }

        function showSaveIndicator() {
            DOM.saveIndicator.textContent = 'Saving…';
            DOM.saveIndicator.classList.add('visible');
        }
        function hideSaveIndicator() {
            DOM.saveIndicator.textContent = 'Saved';
            setTimeout(() => DOM.saveIndicator.classList.remove('visible'), 1200);
        }

        // ─── TOAST ───────────────────────────────────────────────────────────
        function showToast(msg, type = '') {
            const t = document.createElement('div');
            t.className = 'toast' + (type ? ' ' + type : '');
            t.textContent = msg;
            DOM.toastContainer.appendChild(t);
            requestAnimationFrame(() => { requestAnimationFrame(() => t.classList.add('show')); });
            setTimeout(() => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 250);
            }, 2800);
        }
        window.showToast = showToast;

        // ─── SIDEBAR ─────────────────────────────────────────────────────────
        window.toggleSidebar = (forceClose) => {
            const s = DOM.boardsSidebar;
            if (forceClose === true) {
                s.classList.remove('open');
            } else {
                s.classList.toggle('open');
            }
            document.getElementById('btn-boards-toggle')?.classList.toggle('active', s.classList.contains('open'));
        };

        // ─── MODAL HELPERS ───────────────────────────────────────────────────
        window.openModal  = (id) => document.getElementById(id)?.classList.add('open');
        window.closeModal = (id) => document.getElementById(id)?.classList.remove('open');
        document.querySelectorAll('.modal-overlay').forEach(el => {
            el.addEventListener('click', (e) => { if (e.target === el) closeModal(el.id); });
        });
        // Enter key in modals
        document.getElementById('rename-board-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') confirmRenameBoard(); });
        document.getElementById('link-url-input')?.addEventListener('keydown',   e => { if (e.key === 'Enter') confirmAddLink(); });
        document.getElementById('link-title-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') confirmAddLink(); });
        document.getElementById('image-url-input')?.addEventListener('keydown',  e => { if (e.key === 'Enter') confirmAddImage(); });

        // ─── DRAG-DROP & PASTE IMAGE UPLOAD ─────────────────────────────────
        const dropOverlay = document.getElementById('drop-overlay');
        let dragEnterCount = 0;

        document.addEventListener('dragenter', (e) => {
            if ([...e.dataTransfer.types].includes('Files')) {
                dragEnterCount++;
                dropOverlay.classList.add('active');
            }
        });
        document.addEventListener('dragleave', () => {
            dragEnterCount = Math.max(0, dragEnterCount - 1);
            if (dragEnterCount === 0) dropOverlay.classList.remove('active');
        });
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dragEnterCount = 0;
            dropOverlay.classList.remove('active');
            if (!activeBoardId) return;
            const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
            files.forEach((file, i) => {
                const pos = screenToCanvas(e.clientX + i * 20, e.clientY + i * 20);
                compressImage(file, 1200, 0.82).then(src => {
                    const id = 'card_' + Date.now() + '_' + i;
                    const data = { id, type: 'image', x: Math.round(pos.x - 140), y: Math.round(pos.y - 110), width: 280, height: 220, src, caption: '' };
                    cards.push(data);
                    renderCard(data);
                    saveCard(data);
                });
            });
        });

        document.addEventListener('paste', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
            if (!activeBoardId) return;
            const items = [...e.clipboardData.items].filter(i => i.type.startsWith('image/'));
            items.forEach((item, i) => {
                const file = item.getAsFile();
                if (!file) return;
                const rect = DOM.canvasWrap.getBoundingClientRect();
                const cx = (rect.width  / 2 - panX) / zoom;
                const cy = (rect.height / 2 - panY) / zoom;
                compressImage(file, 1200, 0.82).then(src => {
                    const id = 'card_' + Date.now() + '_' + i;
                    const data = { id, type: 'image', x: Math.round(cx - 140 + i * 20), y: Math.round(cy - 110 + i * 20), width: 280, height: 220, src, caption: '' };
                    cards.push(data);
                    renderCard(data);
                    saveCard(data);
                });
            });
        });

        // ─── MEDIA LIBRARY ───────────────────────────────────────────────────
        let mediaLibCache    = [];
        let mediaLibLoaded   = false;
        let mediaFilter      = 'all';
        let mediaLibUnsub    = null;

        window.toggleMediaPanel = (forceClose) => {
            const panel = document.getElementById('media-panel');
            const btn   = document.getElementById('btn-media-toggle');
            const isOpen = panel.classList.contains('open');
            if (forceClose === true || isOpen) {
                panel.classList.remove('open');
                btn.classList.remove('active');
            } else {
                panel.classList.add('open');
                btn.classList.add('active');
                if (!mediaLibLoaded) loadMediaLib();
            }
        };

        window.setMediaFilter = (f) => {
            mediaFilter = f;
            document.querySelectorAll('.media-filter-pill').forEach(p =>
                p.classList.toggle('active', p.dataset.mf === f));
            renderMediaPanel();
        };

        function loadMediaLib() {
            mediaLibLoaded = true;
            if (!currentUser) return;
            if (mediaLibUnsub) mediaLibUnsub();
            mediaLibUnsub = _ons(_col(db, 'users', currentUser.uid, 'links'), snap => {
                mediaLibCache = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .filter(d => d.type === 'image' || d.type === 'video')
                    .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderMediaPanel();
            });
        }

        function ytThumb(url) {
            if (!url) return '';
            try {
                const u = new URL(url);
                let id = u.searchParams.get('v');                                   // watch?v=ID
                if (!id) {
                    const pm = u.pathname.match(/\/(shorts|embed|v)\/([\w-]{11})/);
                    if (pm) id = pm[2];                                             // /shorts/ID  /embed/ID  /v/ID
                }
                if (!id && u.hostname === 'youtu.be') id = u.pathname.slice(1).split('/')[0]; // youtu.be/ID
                if (id && /^[\w-]{11}$/.test(id)) return `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
                // Vimeo
                const vh = u.hostname.replace(/^www\./, '');
                if (vh === 'vimeo.com' || vh === 'player.vimeo.com') {
                    const vm = u.pathname.match(/\/(?:video\/)?(\d+)/);
                    if (vm) return `https://vumbnail.com/${vm[1]}.jpg`;
                }
            } catch {}
            return '';
        }

        window.renderMediaPanel = () => {
            const body   = document.getElementById('media-panel-body');
            const search = (document.getElementById('media-search')?.value || '').trim().toLowerCase();
            if (!body) return;

            let items = mediaLibCache;
            if (mediaFilter !== 'all') items = items.filter(i => i.type === mediaFilter);
            if (search) items = items.filter(i =>
                (i.name || '').toLowerCase().includes(search) ||
                (i.url  || '').toLowerCase().includes(search));

            if (!items.length) {
                body.innerHTML = `<div class="media-panel-empty">${mediaLibLoaded ? 'No media found.' : ''}</div>`;
                return;
            }

            body.innerHTML = items.map(item => {
                const thumbSrc = item.type === 'image'
                    ? item.url
                    : (item.thumbUrl || ytThumb(item.url));
                let inner;
                if (thumbSrc) {
                    const playOverlay = item.type === 'video'
                        ? `<div class="media-thumb-play"><svg viewBox="0 0 32 32" fill="none" width="28" height="28"><circle cx="16" cy="16" r="15" fill="rgba(0,0,0,0.55)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><path d="M13 10.5l10 5.5-10 5.5V10.5z" fill="white"/></svg></div>`
                        : '';
                    inner = `<img src="${escHtml(thumbSrc)}" alt="" loading="lazy" onerror="this.style.display='none'">${playOverlay}`;
                } else {
                    inner = `<div class="media-thumb-icon">▶</div>`;
                }
                return `<div class="media-thumb" title="${escHtml(item.name || item.url || '')}"
                    onclick="addMediaToBoard('${escHtml(item.id)}')">
                    ${inner}
                    <span class="media-thumb-type">${escHtml(item.type)}</span>
                    <span class="media-thumb-label">${escHtml(item.name || item.url || '')}</span>
                </div>`;
            }).join('');
        };

        window.addMediaToBoard = (itemId) => {
            if (!activeBoardId) { showToast('Open a board first.', 'error'); return; }
            const item = mediaLibCache.find(i => i.id === itemId);
            if (!item) return;

            const rect = DOM.canvasWrap.getBoundingClientRect();
            const baseX = Math.round((rect.width  / 2 - panX) / zoom - 140);
            const baseY = Math.round((rect.height / 2 - panY) / zoom - 110);
            const nudge = (cards.length % 8) * 20;
            const x = baseX + nudge, y = baseY + nudge;

            const id = 'card_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
            let data;
            if (item.type === 'image') {
                data = { id, type: 'image', x, y, width: 280, height: 220,
                    src: item.url, caption: item.name || '' };
            } else {
                data = { id, type: 'link', x, y, width: 260, height: 100,
                    url: item.url, title: item.name || item.url || '',
                    favicon: `https://www.google.com/s2/favicons?domain=${encodeURIComponent(item.url || '')}&sz=32` };
            }
            cards.push(data);
            renderCard(data);
            saveCard(data);
            showToast('Added to board.');
        };

        // ─── KEYBOARD SHORTCUTS ──────────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            // Skip if typing in an input/textarea
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;

            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedConnId) {
                    deleteConnection(selectedConnId);
                    closePropsPanel();
                } else {
                    deleteSelected();
                }
            }
            if (e.key === 'Escape') {
                clearSelection();
                closePropsPanel();
                setTool('select');
                toggleSidebar(true);
            }
            if (e.key === 'n' || e.key === 'N') addCard('note');
            if (e.key === 'l' || e.key === 'L') addCard('link');
            if (e.key === 'i' || e.key === 'I') addCard('image');
            if (e.key === 't' || e.key === 'T') addCard('todo');
            if (e.key === ' ') { e.preventDefault(); setTool(activeTool === 'pan' ? 'select' : 'pan'); }
            if ((e.key === '=' || e.key === '+') && (e.ctrlKey || e.metaKey)) { e.preventDefault(); adjustZoom(0.1); }
            if (e.key === '-' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); adjustZoom(-0.1); }
            if (e.key === '0' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); resetZoom(); }
        });

        // ─── SECURITY HELPERS ────────────────────────────────────────────────
        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function sanitizeUrl(url) {
            if (!url) return '';
            try {
                const u = new URL(url);
                if (u.protocol === 'http:' || u.protocol === 'https:' || u.protocol === 'data:') return url;
                return '';
            } catch {
                // relative url or data url
                if (url.startsWith('data:image/')) return url;
                return '';
            }
        }

        // ─── INIT ─────────────────────────────────────────────────────────────
        applyTransform();

    </script>
</body>
</html>
